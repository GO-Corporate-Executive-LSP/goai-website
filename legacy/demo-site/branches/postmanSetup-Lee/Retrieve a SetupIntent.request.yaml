$kind: http-request
description: >-
  <p>Retrieves the details of a SetupIntent that has previously been created.
  </p>


  <p>Client-side retrieval using a publishable key is allowed when the
  <code>client_secret</code> is provided in the query string. </p>


  <p>When retrieved with a publishable key, only a subset of properties will be
  returned. Please refer to the <a href="#setup_intent_object">SetupIntent</a>
  object reference for more details.</p>
url: "{{baseUrl}}/v1/setup_intents/:intent"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: client_secret
    value: <string>
    disabled: true
    description: The client secret of the SetupIntent. We require this string if you
      use a publishable key to retrieve the SetupIntent.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
pathVariables:
  - key: intent
    value: <string>
    description: "(Required) "
order: 3000
