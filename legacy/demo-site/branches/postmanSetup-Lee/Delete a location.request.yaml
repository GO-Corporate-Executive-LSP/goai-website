$kind: http-request
description: <p>Deletes a <code>Location</code> object.</p>
url: "{{baseUrl}}/v1/terminal/locations/:location"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: location
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 3000
