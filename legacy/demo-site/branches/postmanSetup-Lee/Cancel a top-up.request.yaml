$kind: http-request
description: <p>Cancels a top-up. Only pending top-ups can be canceled.</p>
url: "{{baseUrl}}/v1/topups/:topup/cancel"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: topup
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 5000
