$kind: http-request
description: <p>Starts advancing a test clock to a specified time in the future.
  Advancement is done when status changes to <code>Ready</code>.</p>
url: "{{baseUrl}}/v1/test_helpers/test_clocks/:test_clock/advance"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: test_clock
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: frozen_time
      value: <unix-time>
      description: (Required) The time to advance the test clock. Must be after the
        test clock's current frozen time. Cannot be more than two intervals in
        the future from the shortest subscription in this test clock. If there
        are no subscriptions in this test clock, it cannot be more than two
        years in the future.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 5000
