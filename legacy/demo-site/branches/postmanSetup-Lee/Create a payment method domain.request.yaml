$kind: http-request
description: <p>Creates a payment method domain.</p>
url: "{{baseUrl}}/v1/payment_method_domains"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: domain_name
      value: <string>
      description: (Required) The domain name that this payment method domain object
        represents.
    - key: enabled
      value: <boolean>
      disabled: true
      description: Whether this payment method domain is enabled. If the domain is not
        enabled, payment methods that require a payment method domain will not
        appear in Elements.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 2000
