$kind: http-request
description: <p>Marking an invoice as uncollectible is useful for keeping track
  of bad debts that can be written off for accounting purposes.</p>
url: "{{baseUrl}}/v1/invoices/:invoice/mark_uncollectible"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: invoice
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 12000
