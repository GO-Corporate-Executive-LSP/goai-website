$kind: http-request
url: "{{url}}/v1/flex-requests/{{flex_ride_id}}"
method: GET
headers:
  X-Lyft-Program-Id: "{{account_lyft_id}}"
scripts:
  - type: afterResponse
    code: |-
      try {
          const jsonData = JSON.parse(responseBody);
          if (jsonData.ride_id) {
              pm.environment.set("ride_id",jsonData.ride_id);
          }
      } catch (e) {}
    language: text/javascript
order: 2000
