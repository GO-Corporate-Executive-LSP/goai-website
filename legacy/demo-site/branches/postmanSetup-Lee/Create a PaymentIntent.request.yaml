$kind: http-request
description: >-
  <p>Creates a PaymentIntent object.</p>


  <p>After the PaymentIntent is created, attach a payment method and <a
  href="/docs/api/payment_intents/confirm">confirm</a>

  to continue the payment. Learn more about <a
  href="/docs/payments/payment-intents">the available payment flows

  with the Payment Intents API</a>.</p>


  <p>When you use <code>confirm=true</code> during creation, it’s equivalent to
  creating

  and confirming the PaymentIntent in the same call. You can use any parameters

  available in the <a href="/docs/api/payment_intents/confirm">confirm API</a>
  when you supply

  <code>confirm=true</code>.</p>
url: "{{baseUrl}}/v1/payment_intents"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) Amount intended to be collected by this PaymentIntent. A
        positive integer representing how much to charge in the [smallest
        currency unit](https://stripe.com/docs/currencies#zero-decimal) (e.g.,
        100 cents to charge $1.00 or 100 to charge ¥100, a zero-decimal
        currency). The minimum amount is $0.50 US or [equivalent in charge
        currency](https://stripe.com/docs/currencies#minimum-and-maximum-charge-amounts).
        The amount value supports up to eight digits (e.g., a value of 99999999
        for a USD charge of $999,999.99).
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: application_fee_amount
      value: <integer>
      disabled: true
      description: The amount of the application fee (if any) that will be requested
        to be applied to the payment and transferred to the application owner's
        Stripe account. The amount of the application fee collected will be
        capped at the total payment amount. For more information, see the
        PaymentIntents [use case for connected
        accounts](https://stripe.com/docs/payments/connected-accounts).
    - key: automatic_payment_methods[enabled]
      value: <boolean>
      disabled: true
      description: When you enable this parameter, this PaymentIntent accepts payment
        methods that you enable in the Dashboard and that are compatible with
        this PaymentIntent's other parameters.
    - key: automatic_payment_methods[allow_redirects]
      value: <string>
      disabled: true
      description: When you enable this parameter, this PaymentIntent accepts payment
        methods that you enable in the Dashboard and that are compatible with
        this PaymentIntent's other parameters.
    - key: capture_method
      value: <string>
      disabled: true
      description: Controls when the funds will be captured from the customer's account.
    - key: confirm
      value: <boolean>
      disabled: true
      description: Set to `true` to attempt to [confirm this
        PaymentIntent](https://stripe.com/docs/api/payment_intents/confirm)
        immediately. This parameter defaults to `false`. When creating and
        confirming a PaymentIntent at the same time, you can also provide the
        parameters available in the [Confirm
        API](https://stripe.com/docs/api/payment_intents/confirm).
    - key: confirmation_method
      value: <string>
      disabled: true
      description: Describes whether we can confirm this PaymentIntent automatically,
        or if it requires customer action to confirm the payment.
    - key: confirmation_token
      value: <string>
      disabled: true
      description: >-
        ID of the ConfirmationToken used to confirm this PaymentIntent.


        If the provided ConfirmationToken contains properties that are also
        being provided in this request, such as `payment_method`, then the
        values in this request will take precedence.
    - key: customer
      value: <string>
      disabled: true
      description: |-
        ID of the Customer this PaymentIntent belongs to, if one exists.

        Payment methods attached to other Customers cannot be used with this PaymentIntent.

        If present in combination with [setup_future_usage](https://stripe.com/docs/api#payment_intent_object-setup_future_usage), this PaymentIntent's payment method will be attached to the Customer after the PaymentIntent has been confirmed and any required actions from the user are complete.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: error_on_requires_action
      value: <boolean>
      disabled: true
      description: Set to `true` to fail the payment attempt if the PaymentIntent
        transitions into `requires_action`. Use this parameter for simpler
        integrations that don't handle customer actions, such as [saving cards
        without
        authentication](https://stripe.com/docs/payments/save-card-without-authentication).
        This parameter can only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: mandate
      value: <string>
      disabled: true
      description: ID of the mandate that's used for this payment. This parameter can
        only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: mandate_data[customer_acceptance][type]
      value: <string>
      disabled: true
      description: This hash contains details about the Mandate to create. This
        parameter can only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: mandate_data[customer_acceptance][accepted_at]
      value: <unix-time>
      disabled: true
      description: This hash contains details about the Mandate to create. This
        parameter can only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: mandate_data[customer_acceptance][online][ip_address]
      value: <string>
      disabled: true
      description: This hash contains details about the Mandate to create. This
        parameter can only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: mandate_data[customer_acceptance][online][user_agent]
      value: <string>
      disabled: true
      description: This hash contains details about the Mandate to create. This
        parameter can only be used with
        [`confirm=true`](https://stripe.com/docs/api/payment_intents/create#create_payment_intent-confirm).
    - key: on_behalf_of
      value: <string>
      disabled: true
      description: The Stripe account ID that these funds are intended for. Learn more
        about the [use case for connected
        accounts](https://stripe.com/docs/payments/connected-accounts).
    - key: payment_method
      value: <string>
      disabled: true
      description: |-
        ID of the payment method (a PaymentMethod, Card, or [compatible Source](https://stripe.com/docs/payments/payment-methods/transitioning#compatibility) object) to attach to this PaymentIntent.

        If you omit this parameter with `confirm=true`, `customer.default_source` attaches as this PaymentIntent's payment instrument to improve migration for users of the Charges API. We recommend that you explicitly provide the `payment_method` moving forward.
    - key: payment_method_configuration
      value: <string>
      disabled: true
      description: The ID of the payment method configuration to use with this
        PaymentIntent.
    - key: payment_method_data[type]
      value: <string>
      disabled: true
      description: |-
        If provided, this hash will be used to create a PaymentMethod. The new PaymentMethod will appear
