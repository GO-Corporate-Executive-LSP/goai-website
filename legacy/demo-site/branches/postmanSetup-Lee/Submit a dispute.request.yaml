$kind: http-request
description: <p>Submits an Issuing <code>Dispute</code> to the card network.
  Stripe validates that all evidence fields required for the dispute’s reason
  are present. For more details, see <a
  href="/docs/issuing/purchases/disputes#dispute-reasons-and-evidence">Dispute
  reasons and evidence</a>.</p>
url: "{{baseUrl}}/v1/issuing/disputes/:dispute/submit"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: dispute
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 5000
