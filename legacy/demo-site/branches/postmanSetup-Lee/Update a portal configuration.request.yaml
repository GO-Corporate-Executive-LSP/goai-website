$kind: http-request
description: <p>Updates a configuration that describes the functionality of the
  customer portal.</p>
url: "{{baseUrl}}/v1/billing_portal/configurations/:configuration"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: configuration
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
