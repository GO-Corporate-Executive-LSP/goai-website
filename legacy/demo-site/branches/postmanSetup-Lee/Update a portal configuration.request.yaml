      value: <boolean>
      disabled: true
      description: Whether the configuration is active and can be used to create
        portal sessions.
    - key: business_profile[headline]
      value: <string>
      disabled: true
      description: The business information shown to customers in the portal.
    - key: business_profile[privacy_policy_url]
      value: <string>
      disabled: true
      description: The business information shown to customers in the portal.
    - key: business_profile[terms_of_service_url]
      value: <string>
      disabled: true
      description: The business information shown to customers in the portal.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: features[customer_update][allowed_updates][0]
      value: <string>
      disabled: true
