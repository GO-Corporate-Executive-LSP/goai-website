$kind: http-request
description: >-
  <p>Updates an existing Tax <code>Registration</code> object.</p>


  <p>A registration cannot be deleted after it has been created. If you wish to
  end a registration you may do so by setting <code>expires_at</code>.</p>
url: "{{baseUrl}}/v1/tax/registrations/:id"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 3000
