$kind: http-request
description: >-
  <p>Draft invoices are fully editable. Once an invoice is <a
  href="/docs/billing/invoices/workflow#finalized">finalized</a>,

  monetary values, as well as <code>collection_method</code>, become
  uneditable.</p>


  <p>If you would like to stop the Stripe Billing engine from automatically
  finalizing, reattempting payments on,

  sending reminders for, or <a
  href="/docs/billing/invoices/reconciliation">automatically reconciling</a>
  invoices, pass

  <code>auto_advance=false</code>.</p>
url: "{{baseUrl}}/v1/invoices/:invoice"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: invoice
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: account_tax_ids[0]
      value: <string>
      disabled: true
      description: The account tax IDs associated with the invoice. Only editable when
        the invoice is a draft.
    - key: account_tax_ids[1]
      value: <string>
      disabled: true
      description: The account tax IDs associated with the invoice. Only editable when
        the invoice is a draft.
    - key: application_fee_amount
      value: <integer>
      disabled: true
      description: A fee in cents (or local equivalent) that will be applied to the
        invoice and transferred to the application owner's Stripe account. The
        request must be made with an OAuth key or the Stripe-Account header in
        order to take an application fee. For more information, see the
        application fees
        [documentation](https://stripe.com/docs/billing/invoices/connect#collecting-fees).
    - key: auto_advance
      value: <boolean>
      disabled: true
      description: Controls whether Stripe performs [automatic
        collection](https://stripe.com/docs/invoicing/integration/automatic-advancement-collection)
        of the invoice.
    - key: automatic_tax[enabled]
      value: <boolean>
      disabled: true
      description: Settings for automatic tax lookup for this invoice.
    - key: automatic_tax[liability][type]
      value: <string>
      disabled: true
      description: Settings for automatic tax lookup for this invoice.
    - key: automatic_tax[liability][account]
      value: <string>
      disabled: true
      description: Settings for automatic tax lookup for this invoice.
    - key: collection_method
      value: <string>
      disabled: true
      description: Either `charge_automatically` or `send_invoice`. This field can be
        updated only on `draft` invoices.
    - key: custom_fields[0][name]
      value: <string>
      disabled: true
      description: A list of up to 4 custom fields to be displayed on the invoice. If
        a value for `custom_fields` is specified, the list specified will
        replace the existing custom field list on this invoice. Pass an empty
        string to remove previously-defined fields.
    - key: custom_fields[0][value]
      value: <string>
      disabled: true
      description: A list of up to 4 custom fields to be displayed on the invoice. If
        a value for `custom_fields` is specified, the list specified will
        replace the existing custom field list on this invoice. Pass an empty
        string to remove previously-defined fields.
    - key: custom_fields[1][name]
      value: <string>
      disabled: true
      description: A list of up to 4 custom fields to be displayed on the invoice. If
        a value for `custom_fields` is specified, the list specified will
        replace the existing custom field list on this invoice. Pass an empty
        string to remove previously-defined fields.
    - key: custom_fields[1][value]
      value: <string>
      disabled: true
      description: A list of up to 4 custom fields to be displayed on the invoice. If
        a value for `custom_fields` is specified, the list specified will
        replace the existing custom field list on this invoice. Pass an empty
        string to remove previously-defined fields.
    - key: days_until_due
      value: <integer>
      disabled: true
      description: The number of days from which the invoice is created until it is
        due. Only valid for invoices where `collection_method=send_invoice`.
        This field can only be updated on `draft` invoices.
    - key: default_payment_method
      value: <string>
      disabled: true
      description: ID of the default payment method for the invoice. It must belong to
        the customer associated with the invoice. If not set, defaults to the
        subscription's default payment method, if any, or to the default payment
        method in the customer's invoice settings.
    - key: default_tax_rates[0]
      value: <string>
      disabled: true
      description: The tax rates that will apply to any line item that does not have
        `tax_rates` set. Pass an empty string to remove previously-defined tax
        rates.
    - key: default_tax_rates[1]
      value: <string>
      disabled: true
      description: The tax rates that will apply to any line item that does not have
        `tax_rates` set. Pass an empty string to remove previously-defined tax
        rates.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users. Referenced as 'memo' in the Dashboard.
    - key: discounts[0][coupon]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: discounts[0][discount]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: discounts[0][promotion_code]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: discounts[1][coupon]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: discounts[1][discount]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: discounts[1][promotion_code]
      value: <string>
      disabled: true
      description: The discounts that will apply to the invoice. Pass an empty string
        to remove previously-defined discounts.
    - key: due_date
      value: <unix-time>
      disabled: true
      description: The date on which payment for this invoice is due. Only valid for
        invoices where `collection_method=send_invoice`. This field can only be
        updated on `draft` invoices.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: footer
      value: <string>
      disabled: true
      description: Footer to be displayed on the invoice.
    - key: issuer[type]
      value: <string>
      disabled: true
      description: The connected account that issues the invoice. The invoice is
        presented with the branding and support information of the specified
        account.
    - key: issuer[account]
      value: <string>
      disabled: true
      description: The connected account that issues the invoice. The invoice is
        presented with the branding and support information of the specified
        account.
    - key: payment_settings[default_mandate]
      value: <string>
      disabled: true
      description: Configuration settings for the PaymentIntent that is generated when
        the invoice is finalized.
    - key: payment_settings[payment_method_options][acss_debit][mandate_options][transaction_type]
