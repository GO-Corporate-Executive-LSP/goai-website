$kind: http-request
description: <p>Update payment method configuration</p>
url: "{{baseUrl}}/v1/payment_method_configurations/:configuration"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: configuration
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: acss_debit[display_preference][preference]
      value: <string>
      disabled: true
      description: Canadian pre-authorized debit payments, check this
        [page](https://stripe.com/docs/payments/acss-debit) for more details
        like country availability.
    - key: active
      value: <boolean>
      disabled: true
      description: Whether the configuration can be used for new payments.
    - key: affirm[display_preference][preference]
      value: <string>
      disabled: true
      description: "[Affirm](https://www.affirm.com/) gives your customers a way to
        split purchases over a series of payments. Depending on the purchase,
        they can pay with four interest-free payments (Split Pay) or pay over a
        longer term (Installments), which might include interest. Check this
        [page](https://stripe.com/docs/payments/affirm) for more details like
        country availability."
    - key: afterpay_clearpay[display_preference][preference]
      value: <string>
      disabled: true
      description: Afterpay gives your customers a way to pay for purchases in
        installments, check this
        [page](https://stripe.com/docs/payments/afterpay-clearpay) for more
        details like country availability. Afterpay is particularly popular
        among businesses selling fashion, beauty, and sports products.
    - key: alipay[display_preference][preference]
      value: <string>
      disabled: true
      description: Alipay is a digital wallet in China that has more than a billion
        active users worldwide. Alipay users can pay on the web or on a mobile
        device using login credentials or their Alipay app. Alipay has a low
        dispute rate and reduces fraud by authenticating payments using the
        customer's login credentials. Check this
        [page](https://stripe.com/docs/payments/alipay) for more details.
    - key: amazon_pay[display_preference][preference]
      value: <string>
      disabled: true
      description: Amazon Pay is a wallet payment method that lets your customers
        check out the same way as on Amazon.
    - key: apple_pay[display_preference][preference]
      value: <string>
      disabled: true
      description: Stripe users can accept [Apple Pay](/payments/apple-pay) in iOS
        applications in iOS 9 and later, and on the web in Safari starting with
        iOS 10 or macOS Sierra. There are no additional fees to process Apple
        Pay payments, and the [pricing](/pricing) is the same as other card
        transactions. Check this [page](https://stripe.com/docs/apple-pay) for
        more details.
    - key: apple_pay_later[display_preference][preference]
      value: <string>
      disabled: true
      description: Apple Pay Later, a payment method for customers to buy now and pay
        later, gives your customers a way to split purchases into four
        installments across six weeks.
    - key: au_becs_debit[display_preference][preference]
      value: <string>
      disabled: true
      description: Stripe users in Australia can accept Bulk Electronic Clearing
        System (BECS) direct debit payments from customers with an Australian
        bank account. Check this
        [page](https://stripe.com/docs/payments/au-becs-debit) for more details.
    - key: bacs_debit[display_preference][preference]
      value: <string>
      disabled: true
      description: Stripe users in the UK can accept Bacs Direct Debit payments from
        customers with a UK bank account, check this
        [page](https://stripe.com/docs/payments/payment-methods/bacs-debit) for
        more details.
    - key: bancontact[display_preference][preference]
      value: <string>
      disabled: true
      description: Bancontact is the most popular online payment method in Belgium,
        with over 15 million cards in circulation.
        [Customers](https://stripe.com/docs/api/customers) use a Bancontact card
        or mobile app linked to a Belgian bank account to make online payments
        that are secure, guaranteed, and confirmed immediately. Check this
        [page](https://stripe.com/docs/payments/bancontact) for more details.
    - key: blik[display_preference][preference]
      value: <string>
      disabled: true
      description: BLIK is a [single
        use](https://stripe.com/docs/payments/payment-methods#usage) payment
        method that requires customers to authenticate their payments. When
        customers want to pay online using BLIK, they request a six-digit code
        from their banking application and enter it into the payment collection
        form. Check this [page](https://stripe.com/docs/payments/blik) for more
        details.
    - key: boleto[display_preference][preference]
      value: <string>
      disabled: true
      description: Boleto is an official (regulated by the Central Bank of Brazil)
        payment method in Brazil. Check this
        [page](https://stripe.com/docs/payments/boleto) for more details.
    - key: card[display_preference][preference]
      value: <string>
      disabled: true
      description: Cards are a popular way for consumers and businesses to pay online
        or in person. Stripe supports global and local card networks.
    - key: cartes_bancaires[display_preference][preference]
      value: <string>
      disabled: true
      description: Cartes Bancaires is France's local card network. More than 95% of
        these cards are co-branded with either Visa or Mastercard, meaning you
        can process these cards over either Cartes Bancaires or the Visa or
        Mastercard networks. Check this
        [page](https://stripe.com/docs/payments/cartes-bancaires) for more
        details.
    - key: cashapp[display_preference][preference]
      value: <string>
      disabled: true
      description: Cash App is a popular consumer app in the US that allows customers
        to bank, invest, send, and receive money using their digital wallet.
        Check this [page](https://stripe.com/docs/payments/cash-app-pay) for
        more details.
    - key: customer_balance[display_preference][preference]
      value: <string>
      disabled: true
      description: Uses a customer’s [cash
        balance](https://stripe.com/docs/payments/customer-balance) for the
        payment. The cash balance can be funded via a bank transfer. Check this
        [page](https://stripe.com/docs/payments/bank-transfers) for more
        details.
    - key: eps[display_preference][preference]
      value: <string>
      disabled: true
      description: EPS is an Austria-based payment method that allows customers to
        complete transactions online using their bank credentials. EPS is
        supported by all Austrian banks and is accepted by over 80% of Austrian
        online retailers. Check this
        [page](https://stripe.com/docs/payments/eps) for more details.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: fpx[display_preference][preference]
      value: <string>
      disabled: true
      description: Financial Process Exchange (FPX) is a Malaysia-based payment method
        that allows customers to complete transactions online using their bank
        credentials. Bank Negara Malaysia (BNM), the Central Bank of Malaysia,
        and eleven other major Malaysian financial institutions are members of
        the PayNet Group, which owns and operates FPX. It is one of the most
        popular online payment methods in Malaysia, with nearly 90 million
        transactions in 2018 according to BNM. Check this
        [page](https://stripe.com/docs/payments/fpx) for more details.
    - key: giropay[display_preference][preference]
      value: <string>
      disabled: true
      description: giropay is a German payment method based on online banking,
        introduced in 2006. It allows customers to complete transactions online
        using their online banking environment, with funds debited from their
        bank account. Depending on their bank, customers confirm payments on
        giropay using a second factor of authentication or a PIN. giropay
        accounts for 10% of online checkouts in Germany. Check this
        [page](https://stripe.com/docs/payments/giropay) for more details.
    - key: google_pay[display_preference][preference]
      value: <string>
      disabled: true
      description: Google Pay allows customers to make payments in your app or website
        using any credit or debit card saved to their Google Account, including
        those from Google Play, YouTube, Chrome, or an Android device. Use the
        Google Pay API to request any credit or debit card stored in your
        customer's Google account. Check this
        [page](https://stripe.com/docs/google-pay) for more details.
    - key: grabpay[display_preference][preference]
      value: <string>
      disabled: true
      description: GrabPay is a payment method developed by
        [Grab](https://www.grab.com/sg/consumer/finance/pay/). GrabPay is a
        digital wallet - customers maintain a balance in their wallets that they
        pay out with. Check this
        [page](https://stripe.com/docs/payments/grabpay) for more details.
    - key: ideal[display_preference][preference]
      value: <string>
      disabled: true
      description: iDEAL is a Netherlands-based payment method that allows customers
        to complete transactions online using their bank credentials. All major
        Dutch banks are members of Currence, the scheme that operates iDEAL,
        making it the most popular online payment method in the Netherlands with
        a share of online transactions close to 55%. Check this
        [page](https://stripe.com/docs/payments/ideal) for more details.
    - key: jcb[display_preference][preference]
      value: <string>
      disabled: true
      description: JCB is a credit card company based in Japan. JCB is currently
        available in Japan to businesses approved by JCB, and available to all
        businesses in Australia, Canada, Hong Kong, Japan, New Zealand,
        Singapore, Switzerland, United Kingdom, United States, and all countries
        in the European Economic Area except Iceland. Check this
        [page](https://support.stripe.com/questions/accepting-japan-credit-bureau-%28jcb%29-payments)
        for more details.
    - key: klarna[display_preference][preference]
      value: <string>
      disabled: true
      description: Klarna gives customers a range of [payment
        options](https://stripe.com/docs/payments/klarna#payment-options) during
        checkout. Available payment options vary depending on the customer's
        billing address and the transaction amount. These payment options make
        it convenient for customers to purchase items in all price ranges. Check
        this [page](https://stripe.com/docs/payments/klarna) for more details.
    - key: konbini[display_preference][preference]
      value: <string>
      disabled: true
      description: Konbini allows customers in Japan to pay for bills and online
        purchases at convenience stores with cash. Check this
        [page](https://stripe.com/docs/payments/konbini) for more details.
    - key: link[display_preference][preference]
      value: <string>
      disabled: true
      description: "[Link](https://stripe.com/docs/payments/link) is a payment method
        network. With Link, users save their payment details once, then reuse
        that information to pay with one click for any business on the network."
    - key: name
      value: <string>
      disabled: true
      description: Configuration name.
    - key: oxxo[display_preference][preference]
      value: <string>
      disabled: true
      description: OXXO is a Mexican chain of convenience stores with thousands of
        locations across Latin America and represents nearly 20% of online
        transactions in Mexico. OXXO allows customers to pay bills and online
        purchases in-store with cash. Check this
        [page](https://stripe.com/docs/payments/oxxo) for more details.
    - key: p24[display_preference][preference]
      value: <string>
      disabled: true
      description: Przelewy24 is a Poland-based payment method aggregator that allows
        customers to complete transactions online using bank transfers and other
        methods. Bank transfers account for 30% of online payments in Poland and
        Przelewy24 provides a way for customers to pay with over 165 banks.
        Check this [page](https://stripe.com/docs/payments/p24) for more
        details.
    - key: paynow[display_preference][preference]
      value: <string>
      disabled: true
      description: PayNow is a Singapore-based payment method that allows customers to
        make a payment using their preferred app from participating banks and
        participating non-bank financial institutions. Check this
        [page](https://stripe.com/docs/payments/paynow) for more details.
    - key: paypal[display_preference][preference]
      value: <string>
      disabled: true
      description: PayPal, a digital wallet popular with customers in Europe, allows
        your customers worldwide to pay using their PayPal account. Check this
        [page](https://stripe.com/docs/payments/paypal) for more details.
    - key: promptpay[display_preference][preference]
      value: <string>
      disabled: true
      description: PromptPay is a Thailand-based payment method that allows customers
        to make a payment using their preferred app from participating banks.
        Check this [page](https://stripe.com/docs/payments/promptpay) for more
        details.
    - key: revolut_pay[display_preference][preference]
      value: <string>
      disabled: true
      description: Revolut Pay, developed by Revolut, a global finance app, is a
        digital wallet payment method. Revolut Pay uses the customer’s stored
        balance or cards to fund the payment, and offers the option for
        non-Revolut customers to save their details after their first purchase.
    - key: sepa_debit[display_preference][preference]
      value: <string>
      disabled: true
      description: The [Single Euro Payments Area
        (SEPA)](https://en.wikipedia.org/wiki/Single_Euro_Payments_Area) is an
        initiative of the European Union to simplify payments within and across
        member countries. SEPA established and enforced banking standards to
        allow for the direct debiting of every EUR-denominated bank account
        within the SEPA region, check this
        [page](https://stripe.com/docs/payments/sepa-debit) for more details.
    - key: sofort[display_preference][preference]
      value: <string>
      disabled: true
      description: Stripe users in Europe and the United States can use the [Payment
        Intents API](https://stripe.com/docs/payments/payment-intents)—a single
        integration path for creating payments using any supported method—to
        accept [Sofort](https://www.sofort.com/) payments from customers. Check
        this [page](https://stripe.com/docs/payments/sofort) for more details.
    - key: swish[display_preference][preference]
      value: <string>
      disabled: true
      description: Swish is a [real-time](https://stripe.com/docs/payments/real-time)
        payment method popular in Sweden. It allows customers to [authenticate
        and
        approve](https://stripe.com/docs/payments/payment-methods#customer-actions)
        payments using the Swish mobile app and the Swedish BankID mobile app.
        Check this [page](https://stripe.com/docs/payments/swish) for more
        details.
    - key: us_bank_account[display_preference][preference]
      value: <string>
      disabled: true
      description: Stripe users in the United States can accept ACH direct debit
        payments from customers with a US bank account using the Automated
        Clearing House (ACH) payments system operated by Nacha. Check this
        [page](https://stripe.com/docs/payments/ach-debit) for more details.
    - key: wechat_pay[display_preference][preference]
      value: <string>
      disabled: true
      description: WeChat, owned by Tencent, is China's leading mobile app with over 1
        billion monthly active users. Chinese consumers can use WeChat Pay to
        pay for goods and services inside of businesses' apps and websites.
        WeChat Pay users buy most frequently in gaming, e-commerce, travel,
        online education, and food/nutrition. Check this
        [page](https://stripe.com/docs/payments/wechat-pay) for more details.
    - key: zip[display_preference][preference]
      value: <string>
      disabled: true
      description: Zip gives your customers a way to split purchases over a series of
        payments. Check this [page](https://stripe.com/docs/payments/zip) for
        more details like country availability.
order: 4000
