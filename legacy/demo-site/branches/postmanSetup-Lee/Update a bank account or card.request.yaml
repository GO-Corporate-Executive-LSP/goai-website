$kind: http-request
description: >-
  <p>Updates the metadata, account holder name, account holder type of a bank
  account belonging to a <a href="/docs/connect/custom-accounts">Custom
  account</a>, and optionally sets it as the default for its currency. Other
  bank account details are not editable by design.</p>


  <p>You can re-enable a disabled bank account by performing an update call
  without providing any arguments or changes.</p>
url: "{{baseUrl}}/v1/accounts/:account/external_accounts/:id"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
  - key: id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: account_holder_name
      value: <string>
      disabled: true
      description: The name of the person or business that owns the bank account.
    - key: account_holder_type
      value: <string>
      disabled: true
      description: The type of entity that holds the account. This can be either
        `individual` or `company`.
    - key: account_type
      value: <string>
      disabled: true
      description: The bank account type. This can only be `checking` or `savings` in
        most countries. In Japan, this can only be `futsu` or `toza`.
    - key: address_city
      value: <string>
      disabled: true
      description: City/District/Suburb/Town/Village.
    - key: address_country
      value: <string>
      disabled: true
      description: Billing address country, if provided when creating card.
    - key: address_line1
      value: <string>
      disabled: true
      description: Address line 1 (Street address/PO Box/Company name).
    - key: address_line2
      value: <string>
      disabled: true
      description: Address line 2 (Apartment/Suite/Unit/Building).
    - key: address_state
      value: <string>
      disabled: true
      description: State/County/Province/Region.
    - key: address_zip
      value: <string>
      disabled: true
      description: ZIP or postal code.
    - key: default_for_currency
      value: <boolean>
      disabled: true
      description: When set to true, this becomes the default external account for its
        currency.
    - key: documents[bank_account_ownership_verification][files][0]
      value: <string>
      disabled: true
      description: Documents that may be submitted to satisfy various informational
        requests.
    - key: documents[bank_account_ownership_verification][files][1]
      value: <string>
      disabled: true
      description: Documents that may be submitted to satisfy various informational
        requests.
    - key: exp_month
      value: <string>
      disabled: true
      description: Two digit number representing the card’s expiration month.
    - key: exp_year
      value: <string>
      disabled: true
      description: Four digit number representing the card’s expiration year.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: name
      value: <string>
      disabled: true
      description: Cardholder name.
order: 14000
