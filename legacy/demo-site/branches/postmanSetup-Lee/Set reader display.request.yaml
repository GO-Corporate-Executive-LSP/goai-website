      value: <integer>
      disabled: true
      description: Cart
    - key: cart[line_items][1][description]
      value: <string>
      disabled: true
      description: Cart
    - key: cart[line_items][1][quantity]
      value: <integer>
      disabled: true
      description: Cart
    - key: cart[total]
      value: <integer>
      disabled: true
      description: Cart
    - key: cart[tax]
      value: <integer>
      disabled: true
      description: Cart
    - key: expand[0]
      value: <string>
      disabled: true
