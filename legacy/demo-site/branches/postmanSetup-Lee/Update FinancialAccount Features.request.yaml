$kind: http-request
description: <p>Updates the Features associated with a FinancialAccount.</p>
url: "{{baseUrl}}/v1/treasury/financial_accounts/:financial_account/features"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: financial_account
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: card_issuing[requested]
      value: <boolean>
      disabled: true
      description: Encodes the FinancialAccount's ability to be used with the Issuing
        product, including attaching cards to and drawing funds from the
        FinancialAccount.
    - key: deposit_insurance[requested]
      value: <boolean>
      disabled: true
      description: Represents whether this FinancialAccount is eligible for deposit
        insurance. Various factors determine the insurance amount.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: financial_addresses[aba][requested]
      value: <boolean>
      disabled: true
      description: Contains Features that add FinancialAddresses to the FinancialAccount.
    - key: inbound_transfers[ach][requested]
      value: <boolean>
      disabled: true
      description: Contains settings related to adding funds to a FinancialAccount
        from another Account with the same owner.
    - key: intra_stripe_flows[requested]
      value: <boolean>
      disabled: true
      description: Represents the ability for the FinancialAccount to send money to,
        or receive money from other FinancialAccounts (for example, via
        OutboundPayment).
    - key: outbound_payments[ach][requested]
      value: <boolean>
      disabled: true
      description: Includes Features related to initiating money movement out of the
        FinancialAccount to someone else's bucket of money.
    - key: outbound_payments[us_domestic_wire][requested]
      value: <boolean>
      disabled: true
      description: Includes Features related to initiating money movement out of the
        FinancialAccount to someone else's bucket of money.
    - key: outbound_transfers[ach][requested]
      value: <boolean>
      disabled: true
      description: Contains a Feature and settings related to moving money out of the
        FinancialAccount into another Account with the same owner.
    - key: outbound_transfers[us_domestic_wire][requested]
      value: <boolean>
      disabled: true
      description: Contains a Feature and settings related to moving money out of the
        FinancialAccount into another Account with the same owner.
order: 2000
