$kind: http-request
description: <p>Creates a session of the customer portal.</p>
url: "{{baseUrl}}/v1/billing_portal/sessions"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: customer
      value: <string>
      description: (Required) The ID of an existing customer.
    - key: configuration
      value: <string>
      disabled: true
      description: The ID of an existing
        [configuration](https://stripe.com/docs/api/customer_portal/configuration)
        to use for this session, describing its functionality and features. If
        not specified, the session uses the default configuration.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: flow_data[type]
      value: <string>
      disabled: true
      description: Information about a specific flow for the customer to go through.
        See the
        [docs](https://stripe.com/docs/customer-management/portal-deep-links) to
        learn more about using customer portal deep links and flows.
    - key: flow_data[after_completion][type]
      value: <string>
      disabled: true
