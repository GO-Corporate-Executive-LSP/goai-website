$kind: http-request
description: >-
  <p>Updates the specified reversal by setting the values of the parameters
  passed. Any parameters not provided will be left unchanged.</p>


  <p>This request only accepts metadata and description as arguments.</p>
url: "{{baseUrl}}/v1/transfers/:transfer/reversals/:id"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
  - key: transfer
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 4000
