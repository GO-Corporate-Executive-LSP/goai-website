$kind: http-request
description: >-
  <p>Creates a Climate order object for a given Climate product. The order will
  be processed immediately

  after creation and payment will be deducted your Stripe balance.</p>
url: "{{baseUrl}}/v1/climate/orders"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: product
      value: <string>
      description: (Required) Unique identifier of the Climate product.
    - key: amount
      value: <integer>
      disabled: true
      description: Requested amount of carbon removal units. Either this or
        `metric_tons` must be specified.
    - key: beneficiary[public_name]
      value: <string>
      disabled: true
      description: Publicly sharable reference for the end beneficiary of carbon
        removal. Assumed to be the Stripe account if not set.
    - key: currency
      value: <string>
      disabled: true
      description: Request currency for the order as a three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a supported [settlement currency for your
        account](https://stripe.com/docs/currencies). If omitted, the account's
        default currency will be used.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: metric_tons
      value: <decimal>
      disabled: true
      description: Requested number of tons for the order. Either this or `amount`
        must be specified.
order: 2000
