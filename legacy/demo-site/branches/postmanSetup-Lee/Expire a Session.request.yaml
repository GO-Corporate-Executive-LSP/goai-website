$kind: http-request
description: >-
  <p>A Session can be expired when it is in one of these statuses:
  <code>open</code> </p>


  <p>After it expires, a customer can’t complete a Session and customers loading
  the Session see a message saying the Session is expired.</p>
url: "{{baseUrl}}/v1/checkout/sessions/:session/expire"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: session
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 4000
