$kind: http-request
description: <p>Create a test-mode authorization.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/authorizations"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) The total amount to attempt to authorize. This amount is
        in the provided currency, or defaults to the card's currency, and in the
        [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: card
      value: <string>
      description: (Required) Card associated with this authorization.
    - key: amount_details[atm_fee]
      value: <integer>
      disabled: true
      description: Detailed breakdown of amount components. These amounts are
        denominated in `currency` and in the [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: amount_details[cashback_amount]
      value: <integer>
      disabled: true
      description: Detailed breakdown of amount components. These amounts are
        denominated in `currency` and in the [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: authorization_method
      value: <string>
      disabled: true
      description: How the card details were provided. Defaults to online.
    - key: currency
      value: <string>
      disabled: true
      description: The currency of the authorization. If not provided, defaults to the
        currency of the card. Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: is_amount_controllable
      value: <boolean>
      disabled: true
      description: If set `true`, you may provide
        [amount](https://stripe.com/docs/api/issuing/authorizations/approve#approve_issuing_authorization-amount)
        to control how much to hold for the authorization.
    - key: merchant_data[category]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[city]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[country]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[name]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[network_id]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[postal_code]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[state]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[terminal_id]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: merchant_data[url]
      value: <string>
      disabled: true
      description: Details about the seller (grocery store, e-commerce website, etc.)
        where the card authorization happened.
    - key: network_data[acquiring_institution_id]
      value: <string>
      disabled: true
      description: Details about the authorization, such as identifiers, set by the
        card network.
    - key: verification_data[address_line1_check]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[address_postal_code_check]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[authentication_exemption][claimed_by]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[authentication_exemption][type]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[cvc_check]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[expiry_check]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: verification_data[three_d_secure][result]
      value: <string>
      disabled: true
      description: Verifications that Stripe performed on information that the
        cardholder provided to the merchant.
    - key: wallet
      value: <string>
      disabled: true
      description: The digital wallet used for this transaction. One of `apple_pay`,
        `google_pay`, or `samsung_pay`. Will populate as `null` when no digital
        wallet was utilized.
order: 6000
