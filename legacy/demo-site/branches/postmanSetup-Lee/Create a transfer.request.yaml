$kind: http-request
description: <p>To send funds from your Stripe account to a connected account,
  you create a new transfer object. Your <a href="#balance">Stripe balance</a>
  must be able to cover the transfer amount, or you’ll receive an “Insufficient
  Funds” error.</p>
url: "{{baseUrl}}/v1/transfers"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) A positive integer in cents (or local equivalent)
        representing how much to transfer.
    - key: currency
      value: <string>
      description: (Required) 3-letter [ISO code for
        currency](https://stripe.com/docs/payouts).
    - key: destination
      value: <string>
      description: (Required) The ID of a connected Stripe account. <a
        href="/docs/connect/separate-charges-and-transfers">See the Connect
        documentation</a> for details.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: source_transaction
      value: <string>
      disabled: true
      description: You can use this parameter to transfer funds from a charge before
        they are added to your available balance. A pending balance will
        transfer immediately but the funds will not become available until the
        original charge becomes available. [See the Connect
        documentation](https://stripe.com/docs/connect/separate-charges-and-transfers#transfer-availability)
        for details.
    - key: source_type
      value: <string>
      disabled: true
      description: The source balance to use for this transfer. One of `bank_account`,
        `card`, or `fpx`. For most users, this will default to `card`.
    - key: transfer_group
      value: <string>
      disabled: true
      description: A string that identifies this transaction as part of a group. See
        the [Connect
        documentation](https://stripe.com/docs/connect/separate-charges-and-transfers#transfer-options)
        for details.
order: 2000
