$kind: http-request
description: >-
  <p>Issue a credit note to adjust the amount of a finalized invoice. For a
  <code>status=open</code> invoice, a credit note reduces

  its <code>amount_due</code>. For a <code>status=paid</code> invoice, a credit
  note does not affect its <code>amount_due</code>. Instead, it can result

  in any combination of the following:</p>


  <ul>

  <li>Refund: create a new refund (using <code>refund_amount</code>) or link an
  existing refund (using <code>refund</code>).</li>

  <li>Customer balance credit: credit the customer’s balance (using
  <code>credit_amount</code>) which will be automatically applied to their next
  invoice when it’s finalized.</li>

  <li>Outside of Stripe credit: record the amount that is or will be credited
  outside of Stripe (using <code>out_of_band_amount</code>).</li>

  </ul>


  <p>For post-payment credit notes the sum of the refund, credit and outside of
  Stripe amounts must equal the credit note total.</p>


  <p>You may issue multiple credit notes for an invoice. Each credit note will
  increment the invoice’s <code>pre_payment_credit_notes_amount</code>

  or <code>post_payment_credit_notes_amount</code> depending on its
  <code>status</code> at the time of credit note creation.</p>
url: "{{baseUrl}}/v1/credit_notes"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: invoice
      value: <string>
      description: (Required) ID of the invoice.
    - key: amount
      value: <integer>
      disabled: true
      description: The integer amount in cents (or local equivalent) representing the
        total amount of the credit note.
    - key: credit_amount
      value: <integer>
      disabled: true
      description: The integer amount in cents (or local equivalent) representing the
        amount to credit the customer's balance, which will be automatically
        applied to their next invoice.
    - key: effective_at
      value: <unix-time>
      disabled: true
      description: The date when this credit note is in effect. Same as `created`
        unless overwritten. When defined, this value replaces the
        system-generated 'Date of issue' printed on the credit note PDF.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: lines[0][type]
      value: <string>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][amount]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][description]
      value: <string>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][invoice_line_item]
      value: <string>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][quantity]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][0][amount]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][0][tax_rate]
      value: <string>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][0][taxable_amount]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][1][amount]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][1][tax_rate]
      value: <string>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][tax_amounts][1][taxable_amount]
      value: <integer>
      disabled: true
