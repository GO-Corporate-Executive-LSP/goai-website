      description: Line items that make up the credit note.
    - key: lines[0][unit_amount]
      value: <integer>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[0][unit_amount_decimal]
      value: <decimal>
      disabled: true
      description: Line items that make up the credit note.
    - key: lines[1][type]
      value: <string>
