$kind: http-request
description: <p>Creates a new product object.</p>
url: "{{baseUrl}}/v1/products"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: name
      value: <string>
      description: (Required) The product's name, meant to be displayable to the customer.
    - key: active
      value: <boolean>
      disabled: true
      description: Whether the product is currently available for purchase. Defaults
        to `true`.
    - key: default_price_data[currency]
      value: <string>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[currency_options]
      value: <object>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[recurring][interval]
      value: <string>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[recurring][interval_count]
      value: <integer>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[tax_behavior]
      value: <string>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[unit_amount]
      value: <integer>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: default_price_data[unit_amount_decimal]
      value: <decimal>
      disabled: true
      description: Data used to generate a new
        [Price](https://stripe.com/docs/api/prices) object. This Price will be
        set as the default price for this product.
    - key: description
      value: <string>
      disabled: true
      description: The product's description, meant to be displayable to the customer.
        Use this field to optionally store a long form explanation of the
        product being sold for your own rendering purposes.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: id
      value: <string>
      disabled: true
      description: An identifier will be randomly generated by Stripe. You can
        optionally override this ID, but the ID must be unique across all
        products in your Stripe account.
    - key: images[0]
      value: <string>
      disabled: true
      description: A list of up to 8 URLs of images for this product, meant to be
        displayable to the customer.
    - key: images[1]
      value: <string>
      disabled: true
      description: A list of up to 8 URLs of images for this product, meant to be
        displayable to the customer.
    - key: marketing_features[0][name]
      value: <string>
      disabled: true
      description: A list of up to 15 marketing features for this product. These are
        displayed in [pricing
        tables](https://stripe.com/docs/payments/checkout/pricing-table).
    - key: marketing_features[1][name]
      value: <string>
      disabled: true
      description: A list of up to 15 marketing features for this product. These are
        displayed in [pricing
        tables](https://stripe.com/docs/payments/checkout/pricing-table).
    - key: package_dimensions[height]
      value: <number>
      disabled: true
      description: The dimensions of this product for shipping purposes.
    - key: package_dimensions[length]
      value: <number>
      disabled: true
      description: The dimensions of this product for shipping purposes.
    - key: package_dimensions[weight]
      value: <number>
      disabled: true
      description: The dimensions of this product for shipping purposes.
    - key: package_dimensions[width]
      value: <number>
      disabled: true
      description: The dimensions of this product for shipping purposes.
    - key: shippable
      value: <boolean>
      disabled: true
      description: Whether this product is shipped (i.e., physical goods).
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: >-
        An arbitrary string to be displayed on your customer's credit card or
        bank statement. While most banks display this information consistently,
        some may display it incorrectly or not at all.


        This may be up to 22 characters. The statement description may not
        include `<`, `>`, `\`, `"`, `'` characters, and will appear on your
        customer's statement in capital letters. Non-ASCII characters are
        automatically stripped.
         It must contain at least one letter.
    - key: tax_code
      value: <string>
      disabled: true
      description: A [tax code](https://stripe.com/docs/tax/tax-categories) ID.
    - key: unit_label
      value: <string>
      disabled: true
      description: A label that represents units of this product. When set, this will
        be included in customers' receipts, invoices, Checkout, and the customer
        portal.
    - key: url
      value: <string>
      disabled: true
      description: A URL of a publicly-accessible webpage for this product.
order: 2000
