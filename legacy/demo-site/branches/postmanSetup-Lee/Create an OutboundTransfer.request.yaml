$kind: http-request
description: <p>Creates an OutboundTransfer.</p>
url: "{{baseUrl}}/v1/treasury/outbound_transfers"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) Amount (in cents) to be transferred.
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: financial_account
      value: <string>
      description: (Required) The FinancialAccount to pull funds from.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: destination_payment_method
      value: <string>
      disabled: true
      description: The PaymentMethod to use as the payment instrument for the
        OutboundTransfer.
    - key: destination_payment_method_options[us_bank_account][network]
      value: <string>
      disabled: true
      description: Hash describing payment method configuration details.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: Statement descriptor to be shown on the receiving end of an
        OutboundTransfer. Maximum 10 characters for `ach` transfers or 140
        characters for `us_domestic_wire` transfers. The default value is
        "transfer".
order: 5000
