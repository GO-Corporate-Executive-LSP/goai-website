$kind: http-request
description: <p>Creates an Issuing <code>Card</code> object.</p>
url: "{{baseUrl}}/v1/issuing/cards"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: cardholder
      value: <string>
      description: (Required) The
        [Cardholder](https://stripe.com/docs/api#issuing_cardholder_object)
        object with which the card will be associated.
    - key: currency
      value: <string>
      description: (Required) The currency for the card.
    - key: type
      value: <string>
      description: (Required) The type of card to issue. Possible values are
        `physical` or `virtual`.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: financial_account
      value: <string>
      disabled: true
    - key: personalization_design
      value: <string>
      disabled: true
      description: The personalization design object belonging to this card.
    - key: pin[encrypted_number]
      value: <string>
      disabled: true
      description: The desired PIN for this card.
    - key: replacement_for
      value: <string>
      disabled: true
      description: The card this is meant to be a replacement for (if any).
    - key: replacement_reason
      value: <string>
      disabled: true
      description: If `replacement_for` is specified, this should indicate why that
        card is being replaced.
    - key: shipping[address][city]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[address][country]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[address][line1]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[address][postal_code]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[address][line2]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[address][state]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[name]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[customs][eori_number]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[phone_number]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[require_signature]
      value: <boolean>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[service]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: shipping[type]
      value: <string>
      disabled: true
      description: The address where the card will be shipped.
    - key: spending_controls[allowed_categories][0]
      value: <string>
      disabled: true
      description: Rules that control spending for this card. Refer to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[allowed_categories][1]
      value: <string>
      disabled: true
      description: Rules that control spending for this card. Refer to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[allowed_merchant_countries][0]
