        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[spending_limits][1][categories][0]
      value: <string>
      disabled: true
      description: Rules that control spending for this card. Refer to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[spending_limits][1][categories][1]
      value: <string>
      disabled: true
      description: Rules that control spending for this card. Refer to our
