$kind: http-request
description: <p>Deletes an existing <code>tax_id</code> object.</p>
url: "{{baseUrl}}/v1/customers/:customer/tax_ids/:id"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: customer
    value: <string>
    description: "(Required) "
  - key: id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 3000
