$kind: http-request
description: <p>Creates a billing meter</p>
url: "{{baseUrl}}/v1/billing/meters"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: default_aggregation[formula]
      value: <string>
      description: (Required) The default settings to aggregate a meter's events with.
    - key: display_name
      value: <string>
      description: (Required) The meter's name.
    - key: event_name
      value: <string>
      description: (Required) The name of the usage event to record usage for.
        Corresponds with the `event_name` field on usage events.
    - key: customer_mapping[event_payload_key]
      value: <string>
      disabled: true
      description: Fields that specify how to map a meter event to a customer.
    - key: customer_mapping[type]
      value: <string>
      disabled: true
      description: Fields that specify how to map a meter event to a customer.
    - key: event_time_window
      value: <string>
      disabled: true
      description: The time window to pre-aggregate usage events for, if any.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: value_settings[event_payload_key]
      value: <string>
      disabled: true
      description: Fields that specify how to calculate a usage event's value.
order: 2000
