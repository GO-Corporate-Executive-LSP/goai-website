$kind: http-request
name: Update a source
description: >-
  <p>Updates the specified source by setting the values of the parameters
  passed. Any parameters not provided will be left unchanged.</p>


  <p>This request accepts the <code>metadata</code> and <code>owner</code> as
  arguments. It is also possible to update type specific information for
  selected payment methods. Please refer to our <a href="/docs/sources">payment
  method guides</a> for more detail.</p>
url: "{{baseUrl}}/v1/sources/:source"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
