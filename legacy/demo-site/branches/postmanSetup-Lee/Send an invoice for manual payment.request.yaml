$kind: http-request
description: >-
  <p>Stripe will automatically send invoices to customers according to your <a
  href="https://dashboard.stripe.com/account/billing/automatic">subscriptions
  settings</a>. However, if you’d like to manually send an invoice to your
  customer out of the normal schedule, you can do so. When sending invoices that
  have already been paid, there will be no reference to the payment in the
  email.</p>


  <p>Requests made in test-mode result in no emails being sent, despite sending
  an <code>invoice.sent</code> event.</p>
url: "{{baseUrl}}/v1/invoices/:invoice/send"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: invoice
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 14000
