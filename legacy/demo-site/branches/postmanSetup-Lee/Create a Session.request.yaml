$kind: http-request
description: <p>To launch the Financial Connections authorization flow, create a
  <code>Session</code>. The session’s <code>client_secret</code> can be used to
  launch the flow using Stripe.js.</p>
url: "{{baseUrl}}/v1/financial_connections/sessions"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: account_holder[type]
      value: <string>
      description: (Required) The account holder to link accounts for.
    - key: account_holder[account]
      value: <string>
      description: (Required) The account holder to link accounts for.
    - key: account_holder[customer]
      value: <string>
      description: (Required) The account holder to link accounts for.
    - key: permissions[0]
      value: <string>
      description: >-
        (Required) List of data features that you would like to request access
        to.


        Possible values are `balances`, `transactions`, `ownership`, and
        `payment_method`.
    - key: permissions[1]
      value: <string>
      description: >-
        (Required) List of data features that you would like to request access
        to.


        Possible values are `balances`, `transactions`, `ownership`, and
        `payment_method`.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: filters[countries][0]
      value: <string>
      disabled: true
      description: Filters to restrict the kinds of accounts to collect.
    - key: filters[countries][1]
      value: <string>
      disabled: true
      description: Filters to restrict the kinds of accounts to collect.
    - key: prefetch[0]
      value: <string>
      disabled: true
      description: List of data features that you would like to retrieve upon account
        creation.
    - key: prefetch[1]
      value: <string>
      disabled: true
      description: List of data features that you would like to retrieve upon account
        creation.
    - key: return_url
      value: <string>
      disabled: true
      description: For webview integrations only. Upon completing OAuth login in the
        native browser, the user will be redirected to this URL to return to
        your app.
order: 1000
