$kind: http-request
description: <p>Returns a list of existing payouts sent to third-party bank
  accounts or payouts that Stripe sent to you. The payouts return in sorted
  order, with the most recently created payouts appearing first.</p>
url: "{{baseUrl}}/v1/payouts"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: arrival_date[gt]
    value: <integer>
    disabled: true
    description: Only return payouts that are expected to arrive during the given
      date interval.
  - key: arrival_date[gte]
    value: <integer>
    disabled: true
    description: Only return payouts that are expected to arrive during the given
      date interval.
  - key: arrival_date[lt]
    value: <integer>
    disabled: true
    description: Only return payouts that are expected to arrive during the given
      date interval.
  - key: arrival_date[lte]
    value: <integer>
    disabled: true
    description: Only return payouts that are expected to arrive during the given
      date interval.
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return payouts that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return payouts that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return payouts that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return payouts that were created during the given date interval.
  - key: destination
    value: <string>
    disabled: true
    description: The ID of an external account - only return payouts sent to this
      external account.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: status
    value: <string>
    disabled: true
    description: "Only return payouts that have the given status: `pending`, `paid`,
      `failed`, or `canceled`."
order: 1000
