$kind: http-request
description: <p>Creates a new Issuing <code>Cardholder</code> object that can be
  issued cards.</p>
url: "{{baseUrl}}/v1/issuing/cardholders"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: billing[address][city]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: billing[address][country]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: billing[address][line1]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: billing[address][postal_code]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: billing[address][line2]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: billing[address][state]
      value: <string>
      description: (Required) The cardholder's billing address.
    - key: name
      value: <string>
      description: (Required) The cardholder's name. This will be printed on cards
        issued to them. The maximum length of this field is 24 characters. This
        field cannot contain any special characters or numbers.
    - key: company[tax_id]
      value: <string>
      disabled: true
      description: Additional information about a `company` cardholder.
    - key: email
      value: <string>
      disabled: true
      description: The cardholder's email address.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: individual[card_issuing][user_terms_acceptance][date]
      value: <unix-time>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[card_issuing][user_terms_acceptance][ip]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[card_issuing][user_terms_acceptance][user_agent]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[dob][day]
      value: <integer>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[dob][month]
      value: <integer>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[dob][year]
      value: <integer>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[first_name]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[last_name]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[verification][document][back]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: individual[verification][document][front]
      value: <string>
      disabled: true
      description: Additional information about an `individual` cardholder.
    - key: phone_number
      value: <string>
      disabled: true
      description: The cardholder's phone number. This will be transformed to
        [E.164](https://en.wikipedia.org/wiki/E.164) if it is not provided in
        that format already. This is required for all cardholders who will be
        creating EU cards. See the [3D Secure
        documentation](https://stripe.com/docs/issuing/3d-secure#when-is-3d-secure-applied)
        for more details.
    - key: preferred_locales[0]
      value: <string>
      disabled: true
      description: >-
        The cardholder’s preferred locales (languages), ordered by preference.
        Locales can be `de`, `en`, `es`, `fr`, or `it`.
         This changes the language of the [3D Secure flow](https://stripe.com/docs/issuing/3d-secure) and one-time password messages sent to the cardholder.
    - key: preferred_locales[1]
      value: <string>
      disabled: true
      description: >-
        The cardholder’s preferred locales (languages), ordered by preference.
        Locales can be `de`, `en`, `es`, `fr`, or `it`.
         This changes the language of the [3D Secure flow](https://stripe.com/docs/issuing/3d-secure) and one-time password messages sent to the cardholder.
    - key: spending_controls[allowed_categories][0]
      value: <string>
      disabled: true
      description: Rules that control spending across this cardholder's cards. Refer
        to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[allowed_categories][1]
      value: <string>
      disabled: true
      description: Rules that control spending across this cardholder's cards. Refer
        to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
        for more details.
    - key: spending_controls[allowed_merchant_countries][0]
      value: <string>
      disabled: true
      description: Rules that control spending across this cardholder's cards. Refer
        to our
        [documentation](https://stripe.com/docs/issuing/controls/spending-controls)
