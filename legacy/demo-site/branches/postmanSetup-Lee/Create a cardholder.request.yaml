    - key: status
      value: <string>
      disabled: true
      description: Specifies whether to permit authorizations on this cardholder's
        cards. Defaults to `active`.
    - key: type
      value: <string>
      disabled: true
      description: One of `individual` or `company`. See [Choose a cardholder
        type](https://stripe.com/docs/issuing/other/choose-cardholder) for more
        details.
order: 2000
