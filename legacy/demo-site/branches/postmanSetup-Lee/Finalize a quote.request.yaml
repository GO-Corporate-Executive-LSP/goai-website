$kind: http-request
description: <p>Finalizes the quote.</p>
url: "{{baseUrl}}/v1/quotes/:quote/finalize"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: quote
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expires_at
      value: <unix-time>
      disabled: true
      description: A future timestamp on which the quote will be canceled if in `open`
        or `draft` status. Measured in seconds since the Unix epoch.
order: 7000
