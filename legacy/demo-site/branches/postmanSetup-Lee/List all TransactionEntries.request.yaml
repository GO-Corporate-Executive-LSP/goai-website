$kind: http-request
description: <p>Retrieves a list of TransactionEntry objects.</p>
url: "{{baseUrl}}/v1/treasury/transaction_entries?financial_account=<string>"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return TransactionEntries that were created during the given
      date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return TransactionEntries that were created during the given
      date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return TransactionEntries that were created during the given
      date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return TransactionEntries that were created during the given
      date interval.
  - key: effective_at[gt]
    value: <integer>
    disabled: true
  - key: effective_at[gte]
    value: <integer>
    disabled: true
  - key: effective_at[lt]
    value: <integer>
    disabled: true
  - key: effective_at[lte]
    value: <integer>
    disabled: true
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: financial_account
    value: <string>
    description: (Required) Returns objects associated with this FinancialAccount.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: order_by
    value: <string>
    disabled: true
    description: The results are in reverse chronological order by `created` or
      `effective_at`. The default is `created`.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: transaction
    value: <string>
    disabled: true
    description: Only return TransactionEntries associated with this Transaction.
order: 1000
