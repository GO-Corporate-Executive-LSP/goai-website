$kind: http-request
description: <p>Deletes the feature attachment to a product</p>
url: "{{baseUrl}}/v1/products/:product/features/:id"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
  - key: product
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 3000
