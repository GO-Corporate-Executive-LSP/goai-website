$kind: http-request
description: >-
  <p>Confirm that your customer intends to pay with current or provided

  payment method. Upon confirmation, the PaymentIntent will attempt to initiate

  a payment.

  If the selected payment method requires additional authentication steps, the

  PaymentIntent will transition to the <code>requires_action</code> status and

  suggest additional actions via <code>next_action</code>. If payment fails,

  the PaymentIntent transitions to the <code>requires_payment_method</code>
  status or the

  <code>canceled</code> status if the confirmation limit is reached. If

  payment succeeds, the PaymentIntent will transition to the
  <code>succeeded</code>

  status (or <code>requires_capture</code>, if <code>capture_method</code> is
  set to <code>manual</code>).

  If the <code>confirmation_method</code> is <code>automatic</code>, payment may
  be attempted

  using our <a
  href="/docs/stripe-js/reference#stripe-handle-card-payment">client SDKs</a>

  and the PaymentIntent’s <a
  href="#payment_intent_object-client_secret">client_secret</a>.

  After <code>next_action</code>s are handled by the client, no additional

  confirmation is required to complete the payment.

  If the <code>confirmation_method</code> is <code>manual</code>, all payment
  attempts must be

  initiated using a secret key.

  If any actions are required for the payment, the PaymentIntent will

  return to the <code>requires_confirmation</code> state

  after those actions are completed. Your server needs to then

  explicitly re-confirm the PaymentIntent to initiate the next payment

  attempt.</p>
url: "{{baseUrl}}/v1/payment_intents/:intent/confirm"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: intent
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: capture_method
      value: <string>
      disabled: true
      description: Controls when the funds will be captured from the customer's account.
    - key: client_secret
      value: <string>
      disabled: true
      description: The client secret of the PaymentIntent.
    - key: confirmation_token
      value: <string>
      disabled: true
      description: >-
        ID of the ConfirmationToken used to confirm this PaymentIntent.


        If the provided ConfirmationToken contains properties that are also
        being provided in this request, such as `payment_method`, then the
        values in this request will take precedence.
    - key: error_on_requires_action
      value: <boolean>
      disabled: true
      description: Set to `true` to fail the payment attempt if the PaymentIntent
        transitions into `requires_action`. This parameter is intended for
        simpler integrations that do not handle customer actions, like [saving
        cards without
        authentication](https://stripe.com/docs/payments/save-card-without-authentication).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: mandate
      value: <string>
      disabled: true
      description: ID of the mandate that's used for this payment.
    - key: mandate_data[customer_acceptance][type]
      value: <string>
      disabled: true
    - key: mandate_data[customer_acceptance][accepted_at]
      value: <unix-time>
      disabled: true
    - key: mandate_data[customer_acceptance][online][ip_address]
      value: <string>
      disabled: true
    - key: mandate_data[customer_acceptance][online][user_agent]
      value: <string>
      disabled: true
    - key: payment_method
      value: <string>
      disabled: true
      description: ID of the payment method (a PaymentMethod, Card, or [compatible
        Source](https://stripe.com/docs/payments/payment-methods/transitioning#compatibility)
        object) to attach to this PaymentIntent.
