$kind: http-request
description: <p>You can see a list of the reversals belonging to a specific
  transfer. Note that the 10 most recent reversals are always available by
  default on the transfer object. If you need more than those 10, you can use
  this API method and the <code>limit</code> and <code>starting_after</code>
  parameters to page through additional reversals.</p>
url: "{{baseUrl}}/v1/transfers/:id/reversals"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
order: 1000
