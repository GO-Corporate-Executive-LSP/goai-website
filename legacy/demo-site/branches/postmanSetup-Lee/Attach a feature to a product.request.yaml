$kind: http-request
description: <p>Creates a product_feature, which represents a feature attachment
  to a product</p>
url: "{{baseUrl}}/v1/products/:product/features"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: product
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: entitlement_feature
      value: <string>
      description: (Required) The ID of the [Feature](docs/api/entitlements/feature)
        object attached to this product.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 2000
