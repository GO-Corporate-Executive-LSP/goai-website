$kind: http-request
description: <p>Returns a list of your invoice items. Invoice items are returned
  sorted by creation date, with the most recently created invoice items
  appearing first.</p>
url: "{{baseUrl}}/v1/invoiceitems"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return invoice items that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return invoice items that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return invoice items that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return invoice items that were created during the given date interval.
  - key: customer
    value: <string>
    disabled: true
    description: The identifier of the customer whose invoice items to return. If
      none is provided, all invoice items will be returned.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: invoice
    value: <string>
    disabled: true
    description: Only return invoice items belonging to this invoice. If none is
      provided, all invoice items will be returned. If specifying an invoice, no
      customer identifier is needed.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: pending
    value: <boolean>
    disabled: true
    description: Set to `true` to only show pending invoice items, which are not yet
      attached to any invoices. Set to `false` to only show invoice items
      already attached to invoices. If unspecified, no filter is applied.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
order: 1000
