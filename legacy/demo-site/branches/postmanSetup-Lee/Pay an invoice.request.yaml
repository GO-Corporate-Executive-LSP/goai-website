$kind: http-request
description: <p>Stripe automatically creates and then attempts to collect
  payment on invoices for customers on subscriptions according to your <a
  href="https://dashboard.stripe.com/account/billing/automatic">subscriptions
  settings</a>. However, if you’d like to attempt payment on an invoice out of
  the normal collection schedule or for some other reason, you can do so.</p>
url: "{{baseUrl}}/v1/invoices/:invoice/pay"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: invoice
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: forgive
      value: <boolean>
      disabled: true
      description: >-
        In cases where the source used to pay the invoice has insufficient
        funds, passing `forgive=true` controls whether a charge should be
        attempted for the full amount available on the source, up to the amount
        to fully pay the invoice. This effectively forgives the difference
        between the amount available on the source and the amount due. 


        Passing `forgive=false` will fail the charge if the source hasn't been
        pre-funded with the right amount. An example for this case is with ACH
        Credit Transfers and wires: if the amount wired is less than the amount
        due by a small amount, you might want to forgive the difference.
        Defaults to `false`.
    - key: off_session
      value: <boolean>
      disabled: true
      description: Indicates if a customer is on or off-session while an invoice
        payment is attempted. Defaults to `true` (off-session).
    - key: paid_out_of_band
      value: <boolean>
      disabled: true
      description: Boolean representing whether an invoice is paid outside of Stripe.
        This will result in no charge being made. Defaults to `false`.
    - key: payment_method
      value: <string>
      disabled: true
      description: A PaymentMethod to be charged. The PaymentMethod must be the ID of
        a PaymentMethod belonging to the customer associated with the invoice
        being paid.
    - key: source
      value: <string>
      disabled: true
      description: A payment source to be charged. The source must be the ID of a
        source belonging to the customer associated with the invoice being paid.
order: 13000
