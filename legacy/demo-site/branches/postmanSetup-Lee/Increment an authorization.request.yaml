$kind: http-request
description: |-
  <p>Perform an incremental authorization on an eligible
  <a href="/docs/api/payment_intents/object">PaymentIntent</a>. To be eligible, the
  PaymentIntent’s status must be <code>requires_capture</code> and
  <a href="/docs/api/charges/object#charge_object-payment_method_details-card_present-incremental_authorization_supported">incremental_authorization_supported</a>
  must be <code>true</code>.</p>

  <p>Incremental authorizations attempt to increase the authorized amount on
  your customer’s card to the new, higher <code>amount</code> provided. Similar to the
  initial authorization, incremental authorizations can be declined. A
  single PaymentIntent can call this endpoint multiple times to further
  increase the authorized amount.</p>

  <p>If the incremental authorization succeeds, the PaymentIntent object
  returns with the updated
  <a href="/docs/api/payment_intents/object#payment_intent_object-amount">amount</a>.
  If the incremental authorization fails, a
  <a href="/docs/error-codes#card-declined">card_declined</a> error returns, and no other
  fields on the PaymentIntent or Charge update. The PaymentIntent
  object remains capturable for the previously authorized amount.</p>

  <p>Each PaymentIntent can have a maximum of 10 incremental authorization attempts, including declines.
  After it’s captured, a PaymentIntent can no longer be incremented.</p>

  <p>Learn more about <a href="/docs/terminal/features/incremental-authorizations">incremental authorizations</a>.</p>
url: "{{baseUrl}}/v1/payment_intents/:intent/increment_authorization"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: intent
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) The updated total amount that you intend to collect from
        the cardholder. This amount must be greater than the currently
        authorized amount.
    - key: application_fee_amount
      value: <integer>
      disabled: true
      description: The amount of the application fee (if any) that will be requested
        to be applied to the payment and transferred to the application owner's
        Stripe account. The amount of the application fee collected will be
        capped at the total payment amount. For more information, see the
        PaymentIntents [use case for connected
        accounts](https://stripe.com/docs/payments/connected-accounts).
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: For card charges, use
        [statement_descriptor_suffix](https://stripe.com/docs/payments/account/statement-descriptors#dynamic).
        Otherwise, you can use this value as the complete description of a
        charge on your customers' statements. It must contain at least one
        letter and be 1–22 characters long.
    - key: transfer_data[amount]
      value: <integer>
      disabled: true
      description: >-
        The parameters used to automatically create a transfer after the payment
        is captured.

        Learn more about the [use case for connected
        accounts](https://stripe.com/docs/payments/connected-accounts).
order: 10000
