$kind: http-request
description: <p>List events, going back up to 30 days. Each event data is
  rendered according to Stripe API version at its creation time, specified in <a
  href="/docs/api/events/object">event object</a> <code>api_version</code>
  attribute (not according to your current Stripe API version or
  <code>Stripe-Version</code> header).</p>
url: "{{baseUrl}}/v1/events"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return events that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return events that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return events that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return events that were created during the given date interval.
  - key: delivery_success
    value: <boolean>
    disabled: true
    description: Filter events by whether all webhooks were successfully delivered.
      If false, events which are still pending or have failed all delivery
      attempts to a webhook endpoint will be returned.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: type
    value: <string>
    disabled: true
    description: A string containing a specific event name, or group of events using
      * as a wildcard. The list will be filtered to include only events with a
      matching event property.
  - key: types[0]
    value: <string>
    disabled: true
    description: An array of up to 20 strings containing specific event names. The
      list will be filtered to include only events with a matching event
      property. You may pass either `type` or `types`, but not both.
  - key: types[1]
    value: <string>
    disabled: true
    description: An array of up to 20 strings containing specific event names. The
      list will be filtered to include only events with a matching event
      property. You may pass either `type` or `types`, but not both.
order: 1000
