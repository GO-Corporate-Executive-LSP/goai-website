$kind: http-request
description: <p>Retrieves the details of an existing file object. After you
  supply a unique file ID, Stripe returns the corresponding file object. Learn
  how to <a href="/docs/file-upload#download-file-contents">access file
  contents</a>.</p>
url: "{{baseUrl}}/v1/files/:file"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
pathVariables:
  - key: file
    value: <string>
    description: "(Required) "
order: 3000
