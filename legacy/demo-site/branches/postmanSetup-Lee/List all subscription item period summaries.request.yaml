$kind: http-request
description: >-
  <p>For the specified subscription item, returns a list of summary objects.
  Each object in the list provides usage information that’s been summarized from
  multiple usage records and over a subscription billing period (e.g., 15 usage
  records in the month of September).</p>


  <p>The list is sorted in reverse-chronological order (newest first). The first
  list item represents the most current usage period that hasn’t ended yet.
  Since new usage records can still be added, the returned summary information
  for the subscription item’s ID should be seen as unstable until the
  subscription billing period ends.</p>
url: "{{baseUrl}}/v1/subscription_items/:subscription_item/usage_record_summaries"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
pathVariables:
  - key: subscription_item
    value: <string>
    description: "(Required) "
order: 6000
