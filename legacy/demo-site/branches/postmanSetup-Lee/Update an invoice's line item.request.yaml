$kind: http-request
description: >-
  <p>Updates an invoice’s line item. Some fields, such as
  <code>tax_amounts</code>, only live on the invoice line item,

  so they can only be updated through this endpoint. Other fields, such as
  <code>amount</code>, live on both the invoice

  item and the invoice line item, so updates on this endpoint will propagate to
  the invoice item as well.

  Updating an invoice’s line item is only possible before the invoice is
  finalized.</p>
url: "{{baseUrl}}/v1/invoices/:invoice/lines/:line_item_id"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: invoice
    value: <string>
    description: (Required) Invoice ID of line item
  - key: line_item_id
    value: <string>
    description: (Required) Invoice line item ID
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      disabled: true
      description: The integer amount in cents (or local equivalent) of the charge to
        be applied to the upcoming invoice. If you want to apply a credit to the
        customer's account, pass a negative amount.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string which you can attach to the invoice item. The
        description is displayed in the invoice for easy tracking.
    - key: discountable
      value: <boolean>
      disabled: true
      description: Controls whether discounts apply to this line item. Defaults to
        false for prorations or negative line items, and true for all other line
        items. Cannot be set to true for prorations.
    - key: discounts[0][coupon]
      value: <string>
      disabled: true
      description: The coupons, promotion codes & existing discounts which apply to
        the line item. Item discounts are applied before invoice discounts. Pass
        an empty string to remove previously-defined discounts.
    - key: discounts[0][discount]
      value: <string>
      disabled: true
      description: The coupons, promotion codes & existing discounts which apply to
        the line item. Item discounts are applied before invoice discounts. Pass
        an empty string to remove previously-defined discounts.
    - key: discounts[0][promotion_code]
      value: <string>
      disabled: true
      description: The coupons, promotion codes & existing discounts which apply to
        the line item. Item discounts are applied before invoice discounts. Pass
        an empty string to remove previously-defined discounts.
    - key: discounts[1][coupon]
      value: <string>
      disabled: true
      description: The coupons, promotion codes & existing discounts which apply to
        the line item. Item discounts are applied before invoice discounts. Pass
        an empty string to remove previously-defined discounts.
    - key: discounts[1][discount]
      value: <string>
      disabled: true
      description: The coupons, promotion codes & existing discounts which apply to
        the line item. Item discounts are applied before invoice discounts. Pass
        an empty string to remove previously-defined discounts.
    - key: discounts[1][promotion_code]
      value: <string>
      disabled: true
