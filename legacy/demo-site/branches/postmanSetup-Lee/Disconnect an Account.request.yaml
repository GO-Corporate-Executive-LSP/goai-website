  <code>Account</code>. You will no longer be able to access data associated
  with the account (e.g. balances, transactions).</p>
url: "{{baseUrl}}/v1/financial_connections/accounts/:account/disconnect"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 3000
