$kind: http-request
description: <p>Initiates resumption of a paused subscription, optionally
  resetting the billing cycle anchor and creating prorations. If a resumption
  invoice is generated, it must be paid or marked uncollectible before the
  subscription will be unpaused. If payment succeeds the subscription will
  become <code>active</code>, and if payment fails the subscription will be
  <code>past_due</code>. The resumption invoice will void automatically if not
  paid by the expiration date.</p>
url: "{{baseUrl}}/v1/subscriptions/:subscription/resume"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: subscription
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: billing_cycle_anchor
      value: <string>
      disabled: true
      description: Either `now` or `unchanged`. Setting the value to `now` resets the
        subscription's billing cycle anchor to the current time (in UTC).
        Setting the value to `unchanged` advances the subscription's billing
        cycle anchor to the period that surrounds the current time. For more
        information, see the billing cycle
        [documentation](https://stripe.com/docs/billing/subscriptions/billing-cycle).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: proration_behavior
      value: <string>
      disabled: true
      description: Determines how to handle
        [prorations](https://stripe.com/docs/billing/subscriptions/prorations)
        when the billing cycle changes (e.g., when switching plans, resetting
        `billing_cycle_anchor=now`, or starting a trial), or if an item's
        `quantity` changes. The default value is `create_prorations`.
    - key: proration_date
      value: <unix-time>
      disabled: true
      description: If set, the proration will be calculated as though the subscription
        was resumed at the given time. This can be used to apply exactly the
        same proration that was previewed with [upcoming
        invoice](https://stripe.com/docs/api#retrieve_customer_invoice)
        endpoint.
order: 2000
