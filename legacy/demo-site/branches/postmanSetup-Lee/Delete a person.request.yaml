$kind: http-request
description: <p>Deletes an existing person’s relationship to the account’s legal
  entity. Any person with a relationship for an account can be deleted through
  the API, except if the person is the <code>account_opener</code>. If your
  integration is using the <code>executive</code> parameter, you cannot delete
  the only verified <code>executive</code> on file.</p>
url: "{{baseUrl}}/v1/accounts/:account/persons/:person"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
  - key: person
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 3000
