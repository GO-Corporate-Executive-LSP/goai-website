    - key: billing[address][line2]
      value: <string>
      disabled: true
      description: The cardholder's billing address.
    - key: billing[address][state]
      value: <string>
      disabled: true
      description: The cardholder's billing address.
    - key: company[tax_id]
      value: <string>
      disabled: true
      description: Additional information about a `company` cardholder.
    - key: email
      value: <string>
      disabled: true
      description: The cardholder's email address.
    - key: expand[0]
      value: <string>
      disabled: true
