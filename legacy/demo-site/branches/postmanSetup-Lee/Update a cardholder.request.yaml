      disabled: true
      description: The cardholder's phone number. This is required for all cardholders
        who will be creating EU cards. See the [3D Secure
        documentation](https://stripe.com/docs/issuing/3d-secure) for more
        details.
    - key: preferred_locales[0]
      value: <string>
      disabled: true
      description: >-
        The cardholder’s preferred locales (languages), ordered by preference.
        Locales can be `de`, `en`, `es`, `fr`, or `it`.
         This changes the language of the [3D Secure flow](https://stripe.com/docs/issuing/3d-secure) and one-time password messages sent to the cardholder.
