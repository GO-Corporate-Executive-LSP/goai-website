$kind: http-request
description: <p>Updates the specified Issuing <code>Cardholder</code> object by
  setting the values of the parameters passed. Any parameters not provided will
  be left unchanged.</p>
url: "{{baseUrl}}/v1/issuing/cardholders/:cardholder"
method: POST
headers:
