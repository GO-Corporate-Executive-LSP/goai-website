$kind: http-request
description: <p>Returns a list of your active prices, excluding <a
  href="/docs/products-prices/pricing-models#inline-pricing">inline prices</a>.
  For the list of inactive prices, set <code>active</code> to false.</p>
url: "{{baseUrl}}/v1/prices"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: active
    value: <boolean>
    disabled: true
    description: Only return prices that are active or inactive (e.g., pass `false`
      to list all inactive prices).
  - key: created[gt]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: currency
    value: <string>
    disabled: true
    description: Only return prices for the given currency.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: lookup_keys[0]
    value: <string>
    disabled: true
    description: Only return the price with these lookup_keys, if any exist.
  - key: lookup_keys[1]
    value: <string>
    disabled: true
    description: Only return the price with these lookup_keys, if any exist.
  - key: product
    value: <string>
    disabled: true
    description: Only return prices for the given product.
  - key: recurring[interval]
    value: <string>
    disabled: true
    description: Only return prices with these recurring fields.
  - key: recurring[meter]
    value: <string>
    disabled: true
    description: Only return prices with these recurring fields.
  - key: recurring[usage_type]
    value: <string>
    disabled: true
    description: Only return prices with these recurring fields.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: type
    value: <string>
    disabled: true
    description: Only return prices of type `recurring` or `one_time`.
order: 1000
