$kind: http-request
description: <p>Returns a list of <code>ValueList</code> objects. The objects
  are sorted in descending order by creation date, with the most recently
  created object appearing first.</p>
url: "{{baseUrl}}/v1/radar/value_lists"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: alias
    value: <string>
    disabled: true
    description: The alias used to reference the value list when writing rules.
  - key: contains
    value: <string>
    disabled: true
    description: A value contained within a value list - returns all value lists
      containing this value.
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return value lists that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return value lists that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return value lists that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return value lists that were created during the given date interval.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
order: 1000
