url: "{{baseUrl}}/v1/tax_ids/:id"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 7000
