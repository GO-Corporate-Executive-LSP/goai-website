$kind: http-request
description: <p>Creates a new shipping rate object.</p>
url: "{{baseUrl}}/v1/shipping_rates"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: display_name
      value: <string>
      description: (Required) The name of the shipping rate, meant to be displayable
        to the customer. This will appear on CheckoutSessions.
    - key: delivery_estimate[maximum][unit]
      value: <string>
      disabled: true
      description: The estimated range for how long shipping will take, meant to be
        displayable to the customer. This will appear on CheckoutSessions.
    - key: delivery_estimate[maximum][value]
      value: <integer>
      disabled: true
      description: The estimated range for how long shipping will take, meant to be
        displayable to the customer. This will appear on CheckoutSessions.
    - key: delivery_estimate[minimum][unit]
      value: <string>
      disabled: true
      description: The estimated range for how long shipping will take, meant to be
        displayable to the customer. This will appear on CheckoutSessions.
    - key: delivery_estimate[minimum][value]
      value: <integer>
      disabled: true
      description: The estimated range for how long shipping will take, meant to be
        displayable to the customer. This will appear on CheckoutSessions.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: fixed_amount[amount]
      value: <integer>
      disabled: true
      description: Describes a fixed amount to charge for shipping. Must be present if
        type is `fixed_amount`.
    - key: fixed_amount[currency]
      value: <string>
      disabled: true
      description: Describes a fixed amount to charge for shipping. Must be present if
        type is `fixed_amount`.
    - key: fixed_amount[currency_options]
      value: <object>
      disabled: true
      description: Describes a fixed amount to charge for shipping. Must be present if
        type is `fixed_amount`.
    - key: tax_behavior
      value: <string>
      disabled: true
      description: Specifies whether the rate is considered inclusive of taxes or
        exclusive of taxes. One of `inclusive`, `exclusive`, or `unspecified`.
    - key: tax_code
      value: <string>
      disabled: true
      description: A [tax code](https://stripe.com/docs/tax/tax-categories) ID. The
        Shipping tax code is `txcd_92010001`.
    - key: type
      value: <string>
      disabled: true
      description: The type of calculation to use on the shipping rate. Can only be
        `fixed_amount` for now.
order: 2000
