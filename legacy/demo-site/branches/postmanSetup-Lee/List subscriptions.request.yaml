$kind: http-request
description: <p>By default, returns a list of subscriptions that have not been
  canceled. In order to list canceled subscriptions, specify
  <code>status=canceled</code>.</p>
url: "{{baseUrl}}/v1/subscriptions"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: automatic_tax[enabled]
    value: <boolean>
    disabled: true
    description: Filter subscriptions by their automatic tax settings.
  - key: collection_method
    value: <string>
    disabled: true
    description: The collection method of the subscriptions to retrieve. Either
      `charge_automatically` or `send_invoice`.
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return subscriptions that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return subscriptions that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return subscriptions that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return subscriptions that were created during the given date interval.
  - key: current_period_end[gt]
    value: <integer>
    disabled: true
  - key: current_period_end[gte]
    value: <integer>
    disabled: true
  - key: current_period_end[lt]
    value: <integer>
    disabled: true
  - key: current_period_end[lte]
    value: <integer>
    disabled: true
  - key: current_period_start[gt]
    value: <integer>
    disabled: true
  - key: current_period_start[gte]
    value: <integer>
    disabled: true
  - key: current_period_start[lt]
    value: <integer>
    disabled: true
  - key: current_period_start[lte]
    value: <integer>
    disabled: true
  - key: customer
    value: <string>
    disabled: true
    description: The ID of the customer whose subscriptions will be retrieved.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: price
    value: <string>
    disabled: true
    description: Filter for subscriptions that contain this recurring price ID.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: status
    value: <string>
    disabled: true
    description: The status of the subscriptions to retrieve. Passing in a value of
      `canceled` will return all canceled subscriptions, including those
      belonging to deleted customers. Pass `ended` to find subscriptions that
      are canceled and subscriptions that are expired due to [incomplete
      payment](https://stripe.com/docs/billing/subscriptions/overview#subscription-statuses).
      Passing in a value of `all` will return subscriptions of all statuses. If
      no value is supplied, all subscriptions that have not been canceled are
      returned.
  - key: test_clock
    value: <string>
    disabled: true
    description: Filter for subscriptions that are associated with the specified
      test clock. The response will not include subscriptions with test clocks
      if this and the customer parameter is not set.
order: 1000
