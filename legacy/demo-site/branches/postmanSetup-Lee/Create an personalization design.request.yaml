$kind: http-request
description: <p>Creates a personalization design object.</p>
url: "{{baseUrl}}/v1/issuing/personalization_designs"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: physical_bundle
      value: <string>
      description: (Required) The physical bundle object belonging to this
        personalization design.
    - key: card_logo
      value: <string>
      disabled: true
      description: The file for the card logo, for use with physical bundles that
        support card logos. Must have a `purpose` value of `issuing_logo`.
    - key: carrier_text[footer_body]
      value: <string>
      disabled: true
      description: Hash containing carrier text, for use with physical bundles that
        support carrier text.
    - key: carrier_text[footer_title]
      value: <string>
      disabled: true
      description: Hash containing carrier text, for use with physical bundles that
        support carrier text.
    - key: carrier_text[header_body]
      value: <string>
      disabled: true
      description: Hash containing carrier text, for use with physical bundles that
        support carrier text.
    - key: carrier_text[header_title]
      value: <string>
      disabled: true
      description: Hash containing carrier text, for use with physical bundles that
        support carrier text.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: lookup_key
      value: <string>
      disabled: true
      description: A lookup key used to retrieve personalization designs dynamically
        from a static string. This may be up to 200 characters.
    - key: name
      value: <string>
      disabled: true
      description: Friendly display name.
    - key: preferences[is_default]
      value: <boolean>
      disabled: true
      description: Information on whether this personalization design is used to
        create cards when one is not specified.
    - key: transfer_lookup_key
      value: <boolean>
      disabled: true
      description: If set to true, will atomically remove the lookup key from the
        existing personalization design, and assign it to this personalization
        design.
order: 2000
