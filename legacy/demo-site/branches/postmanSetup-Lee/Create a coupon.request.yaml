$kind: http-request
description: >-
  <p>You can create coupons easily via the <a
  href="https://dashboard.stripe.com/coupons">coupon management</a> page of the
  Stripe dashboard. Coupon creation is also accessible via the API if you need
  to create coupons on the fly.</p>


  <p>A coupon has either a <code>percent_off</code> or an
  <code>amount_off</code> and <code>currency</code>. If you set an
  <code>amount_off</code>, that amount will be subtracted from any invoice’s
  subtotal. For example, an invoice with a subtotal of <currency>100</currency>
  will have a final total of <currency>0</currency> if a coupon with an
  <code>amount_off</code> of <amount>200</amount> is applied to it and an
  invoice with a subtotal of <currency>300</currency> will have a final total of
  <currency>100</currency> if a coupon with an <code>amount_off</code> of
  <amount>200</amount> is applied to it.</p>
url: "{{baseUrl}}/v1/coupons"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount_off
      value: <integer>
      disabled: true
      description: A positive integer representing the amount to subtract from an
        invoice total (required if `percent_off` is not passed).
    - key: applies_to[products][0]
      value: <string>
      disabled: true
      description: A hash containing directions for what this Coupon will apply
        discounts to.
    - key: applies_to[products][1]
      value: <string>
      disabled: true
      description: A hash containing directions for what this Coupon will apply
        discounts to.
    - key: currency
      value: <string>
      disabled: true
      description: Three-letter [ISO code for the
        currency](https://stripe.com/docs/currencies) of the `amount_off`
        parameter (required if `amount_off` is passed).
    - key: duration
      value: <string>
      disabled: true
      description: Specifies how long the discount will be in effect if used on a
        subscription. Defaults to `once`.
    - key: duration_in_months
      value: <integer>
      disabled: true
      description: Required only if `duration` is `repeating`, in which case it must
        be a positive integer that specifies the number of months the discount
        will be in effect.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: id
      value: <string>
      disabled: true
      description: Unique string of your choice that will be used to identify this
        coupon when applying it to a customer. If you don't want to specify a
        particular code, you can leave the ID blank and we'll generate a random
        code for you.
    - key: max_redemptions
      value: <integer>
      disabled: true
      description: A positive integer specifying the number of times the coupon can be
        redeemed before it's no longer valid. For example, you might have a 50%
        off coupon that the first 20 readers of your blog can use.
    - key: name
      value: <string>
      disabled: true
      description: Name of the coupon displayed to customers on, for instance
        invoices, or receipts. By default the `id` is shown if `name` is not
        set.
    - key: percent_off
      value: <number>
      disabled: true
      description: A positive float larger than 0, and smaller or equal to 100, that
        represents the discount the coupon will apply (required if `amount_off`
        is not passed).
    - key: redeem_by
      value: <unix-time>
      disabled: true
      description: Unix timestamp specifying the last time at which the coupon can be
        redeemed. After the redeem_by date, the coupon can no longer be applied
        to new customers.
order: 2000
