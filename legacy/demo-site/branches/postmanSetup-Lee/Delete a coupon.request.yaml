$kind: http-request
description: <p>You can delete coupons via the <a
  href="https://dashboard.stripe.com/coupons">coupon management</a> page of the
  Stripe dashboard. However, deleting a coupon does not affect any customers who
  have already applied the coupon; it means that new customers can’t redeem the
  coupon. You can also delete coupons via the API.</p>
url: "{{baseUrl}}/v1/coupons/:coupon"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: coupon
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 3000
