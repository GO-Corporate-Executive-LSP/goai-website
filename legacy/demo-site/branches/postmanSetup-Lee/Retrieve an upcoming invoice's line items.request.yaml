  - key: subscription_proration_date
    value: <unix-time>
    disabled: true
    description: If previewing an update to a subscription, and doing proration,
      `subscription_proration_date` forces the proration to be calculated as
      though the update was done at the specified time. The time given must be
      within the current subscription period and within the current phase of the
      schedule backing this subscription, if the schedule exists. If set,
      `subscription`, and one of `subscription_items`, or
      `subscription_trial_end` are required. Also,
      `subscription_proration_behavior` cannot be set to 'none'.
