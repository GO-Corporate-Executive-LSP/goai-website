$kind: http-request
description: >-
  <p>Reverses a payout by debiting the destination bank account. At this time,
  you can only reverse payouts for connected accounts to US bank accounts. If
  the payout is manual and in the <code>pending</code> status, use
  <code>/v1/payouts/:id/cancel</code> instead.</p>


  <p>By requesting a reversal through <code>/v1/payouts/:id/reverse</code>, you
  confirm that the authorized signatory of the selected bank account authorizes
  the debit on the bank account and that no other authorization is required.</p>
url: "{{baseUrl}}/v1/payouts/:payout/reverse"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: payout
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 6000
