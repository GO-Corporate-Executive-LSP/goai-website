$kind: http-request
description: <p>Updates an existing payment method domain.</p>
url: "{{baseUrl}}/v1/payment_method_domains/:payment_method_domain"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: payment_method_domain
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: enabled
      value: <boolean>
      disabled: true
      description: Whether this payment method domain is enabled. If the domain is not
        enabled, payment methods that require a payment method domain will not
        appear in Elements.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 4000
