$kind: http-request
description: <p>Allows the user to refund an arbitrary amount, also known as a
  unlinked refund.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/transactions/create_unlinked_refund"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) The total amount to attempt to refund. This amount is in
        the provided currency, or defaults to the cards currency, and in the
        [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: card
      value: <string>
      description: (Required) Card associated with this unlinked refund transaction.
    - key: currency
      value: <string>
      disabled: true
      description: The currency of the unlinked refund. If not provided, defaults to
        the currency of the card. Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
