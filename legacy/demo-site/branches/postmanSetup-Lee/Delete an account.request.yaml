$kind: http-request
description: >-
  <p>With <a href="/docs/connect">Connect</a>, you can delete accounts you
  manage.</p>


  <p>Accounts created using test-mode keys can be deleted at any time. Standard
  accounts created using live-mode keys cannot be deleted. Custom or Express
  accounts created using live-mode keys can only be deleted once all balances
  are zero.</p>


  <p>If you want to delete your own account, use the <a
  href="https://dashboard.stripe.com/settings/account">account information tab
  in your account settings</a> instead.</p>
url: "{{baseUrl}}/v1/accounts/:account"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
order: 4000
