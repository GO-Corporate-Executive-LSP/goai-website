$kind: http-request
description: <p>Returns a list of your products. The products are returned
  sorted by creation date, with the most recently created products appearing
  first.</p>
url: "{{baseUrl}}/v1/products"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: active
    value: <boolean>
    disabled: true
    description: Only return products that are active or inactive (e.g., pass
      `false` to list all inactive products).
  - key: created[gt]
    value: <integer>
    disabled: true
    description: Only return products that were created during the given date interval.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: Only return products that were created during the given date interval.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: Only return products that were created during the given date interval.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: Only return products that were created during the given date interval.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: ids[0]
    value: <string>
    disabled: true
    description: Only return products with the given IDs. Cannot be used with
      [starting_after](https://stripe.com/docs/api#list_products-starting_after)
      or
      [ending_before](https://stripe.com/docs/api#list_products-ending_before).
  - key: ids[1]
    value: <string>
    disabled: true
    description: Only return products with the given IDs. Cannot be used with
      [starting_after](https://stripe.com/docs/api#list_products-starting_after)
      or
      [ending_before](https://stripe.com/docs/api#list_products-ending_before).
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: shippable
    value: <boolean>
    disabled: true
    description: Only return products that can be shipped (i.e., physical, not
      digital products).
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
  - key: url
    value: <string>
    disabled: true
    description: Only return products with the given url.
order: 1000
