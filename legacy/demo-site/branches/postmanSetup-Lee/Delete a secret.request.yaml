$kind: http-request
description: <p>Deletes a secret from the secret store by name and scope.</p>
url: "{{baseUrl}}/v1/apps/secrets/delete"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: name
      value: <string>
      description: (Required) A name for the secret that's unique within the scope.
    - key: scope[type]
      value: <string>
      description: (Required) Specifies the scoping of the secret. Requests
        originating from UI extensions can only access account-scoped secrets or
        secrets scoped to their own user.
    - key: scope[user]
      value: <string>
      description: (Required) Specifies the scoping of the secret. Requests
        originating from UI extensions can only access account-scoped secrets or
        secrets scoped to their own user.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 3000
