$kind: http-request
description: <p>Create or replace a secret in the secret store.</p>
url: "{{baseUrl}}/v1/apps/secrets"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: name
      value: <string>
      description: (Required) A name for the secret that's unique within the scope.
    - key: payload
      value: <string>
      description: (Required) The plaintext secret value to be stored.
    - key: scope[type]
      value: <string>
      description: (Required) Specifies the scoping of the secret. Requests
        originating from UI extensions can only access account-scoped secrets or
        secrets scoped to their own user.
    - key: scope[user]
      value: <string>
      description: (Required) Specifies the scoping of the secret. Requests
        originating from UI extensions can only access account-scoped secrets or
        secrets scoped to their own user.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expires_at
      value: <unix-time>
      disabled: true
      description: The Unix timestamp for the expiry time of the secret, after which
        the secret deletes.
order: 2000
