$kind: http-request
description: <p>Updates the shipping status of the specified Issuing
  <code>Card</code> object to <code>failure</code>.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/cards/:card/shipping/fail"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: card
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 5000
