$kind: http-request
name: "Test mode: Succeed an InboundTransfer"
description: <p>Transitions a test mode created InboundTransfer to the
  <code>succeeded</code> status. The InboundTransfer must already be in the
  <code>processing</code> state.</p>
url: "{{baseUrl}}/v1/test_helpers/treasury/inbound_transfers/:id/succeed"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 2000
