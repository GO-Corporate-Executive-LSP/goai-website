      value: <string>
      disabled: true
      description: Evidence to upload, to respond to a dispute. Updating any field in
        the hash will submit all fields in the hash for review. The combined
        character count of all fields is limited to 150,000.
    - key: evidence[billing_address]
      value: <string>
      disabled: true
