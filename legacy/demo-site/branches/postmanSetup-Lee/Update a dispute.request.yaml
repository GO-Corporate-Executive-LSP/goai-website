$kind: http-request
description: >-
  <p>When you get a dispute, contacting your customer is always the best first
  step. If that doesn’t work, you can submit evidence to help us resolve the
  dispute in your favor. You can do this in your <a
  href="https://dashboard.stripe.com/disputes">dashboard</a>, but if you prefer,
  you can use the API to submit evidence programmatically.</p>


  <p>Depending on your dispute type, different evidence fields will give you a
  better chance of winning your dispute. To figure out which evidence fields to
  provide, see our <a href="/docs/disputes/categories">guide to dispute
  types</a>.</p>
url: "{{baseUrl}}/v1/disputes/:dispute"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: dispute
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
