$kind: http-request
description: <p>Reverse a test-mode Authorization.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/authorizations/:authorization/reverse"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: authorization
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: reverse_amount
      value: <integer>
      disabled: true
      description: The amount to reverse from the authorization. If not provided, the
        full amount of the authorization will be reversed. This amount is in the
        authorization currency and in the [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
order: 10000
