$kind: http-request
description: <p>Updates an existing file link object. Expired links can no
  longer be updated.</p>
url: "{{baseUrl}}/v1/file_links/:link"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: link
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 4000
