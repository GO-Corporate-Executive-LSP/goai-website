$kind: http-request
description: <p>Updates the specified Issuing <code>Card</code> object by
  setting the values of the parameters passed. Any parameters not provided will
  be left unchanged.</p>
url: "{{baseUrl}}/v1/issuing/cards/:card"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
