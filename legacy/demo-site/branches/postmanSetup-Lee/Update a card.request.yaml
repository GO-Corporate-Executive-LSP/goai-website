      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: personalization_design
      value: <string>
      disabled: true
    - key: pin[encrypted_number]
      value: <string>
      disabled: true
      description: The desired new PIN for this card.
    - key: spending_controls[allowed_categories][0]
      value: <string>
      disabled: true
      description: Rules that control spending for this card. Refer to our
