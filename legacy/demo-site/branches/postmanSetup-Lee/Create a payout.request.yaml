$kind: http-request
description: >-
  <p>To send funds to your own bank account, create a new payout object. Your <a
  href="#balance">Stripe balance</a> must cover the payout amount. If it
  doesn’t, you receive an “Insufficient Funds” error.</p>


  <p>If your API key is in test mode, money won’t actually be sent, though every
  other action occurs as if you’re in live mode.</p>


  <p>If you create a manual payout on a Stripe account that uses multiple
  payment source types, you need to specify the source type balance that the
  payout draws from. The <a href="#balance_object">balance object</a> details
  available and pending amounts by source type.</p>
url: "{{baseUrl}}/v1/payouts"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) A positive integer in cents representing how much to payout.
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: destination
      value: <string>
      disabled: true
      description: The ID of a bank account or a card to send the payout to. If you
        don't provide a destination, we use the default external account for the
        specified currency.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: method
      value: <string>
      disabled: true
      description: The method used to send this payout, which is `standard` or
        `instant`. We support `instant` for payouts to debit cards and bank
        accounts in certain countries. Learn more about [bank support for
        Instant Payouts](https://stripe.com/docs/payouts/instant-payouts-banks).
    - key: source_type
      value: <string>
      disabled: true
      description: The balance type of your Stripe balance to draw this payout from.
        Balances for different payment sources are kept separately. You can find
        the amounts with the Balances API. One of `bank_account`, `card`, or
        `fpx`.
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: A string that displays on the recipient's bank or card statement
        (up to 22 characters). A `statement_descriptor` that's longer than 22
        characters return an error. Most banks truncate this information and
        display it inconsistently. Some banks might not display it at all.
order: 2000
