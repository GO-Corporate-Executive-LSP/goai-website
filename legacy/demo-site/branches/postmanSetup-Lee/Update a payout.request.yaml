$kind: http-request
description: <p>Updates the specified payout by setting the values of the
  parameters you pass. We don’t change parameters that you don’t provide. This
  request only accepts the metadata as arguments.</p>
url: "{{baseUrl}}/v1/payouts/:payout"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: payout
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 4000
