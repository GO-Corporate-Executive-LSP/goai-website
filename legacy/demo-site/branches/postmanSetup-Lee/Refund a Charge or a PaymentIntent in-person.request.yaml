$kind: http-request
description: <p>Initiates a refund on a Reader</p>
url: "{{baseUrl}}/v1/terminal/readers/:reader/refund_payment"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: reader
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      disabled: true
      description: A positive integer in __cents__ representing how much of this
        charge to refund.
    - key: charge
      value: <string>
      disabled: true
      description: ID of the Charge to refund.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: payment_intent
      value: <string>
      disabled: true
      description: ID of the PaymentIntent to refund.
    - key: refund_application_fee
      value: <boolean>
      disabled: true
      description: Boolean indicating whether the application fee should be refunded
        when refunding this charge. If a full charge refund is given, the full
        application fee will be refunded. Otherwise, the application fee will be
        refunded in an amount proportional to the amount of the charge refunded.
        An application fee can be refunded only by the application that created
        the charge.
    - key: refund_payment_config[enable_customer_cancellation]
      value: <boolean>
      disabled: true
      description: Configuration overrides
    - key: reverse_transfer
      value: <boolean>
      disabled: true
      description: Boolean indicating whether the transfer should be reversed when
        refunding this charge. The transfer will be reversed proportionally to
        the amount being refunded (either the entire or partial amount). A
        transfer can be reversed only by the application that created the
        charge.
order: 9000
