$kind: http-request
description: >-
  <p>With <a href="/docs/connect">Connect</a>, you can create Stripe accounts
  for your users.

  To do this, you’ll first need to <a
  href="https://dashboard.stripe.com/account/applications/settings">register
  your platform</a>.</p>


  <p>If you’ve already collected information for your connected accounts, you <a
  href="/docs/connect/best-practices#onboarding">can prefill that
  information</a> when

  creating the account. Connect Onboarding won’t ask for the prefilled
  information during account onboarding.

  You can prefill any information on the account.</p>
url: "{{baseUrl}}/v1/accounts"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: type
      value: <string>
      description: (Required) The type of Stripe account to create. May be one of
        `custom`, `express` or `standard`.
    - key: account_token
      value: <string>
      disabled: true
      description: An [account
        token](https://stripe.com/docs/api#create_account_token), used to
        securely provide details to the account.
    - key: bank_account[account_number]
      value: <string>
      disabled: true
      description: Either a token, like the ones returned by
        [Stripe.js](https://stripe.com/docs/js), or a dictionary containing a
        user's bank account details.
    - key: bank_account[country]
      value: <string>
      disabled: true
      description: Either a token, like the ones returned by
        [Stripe.js](https://stripe.com/docs/js), or a dictionary containing a
