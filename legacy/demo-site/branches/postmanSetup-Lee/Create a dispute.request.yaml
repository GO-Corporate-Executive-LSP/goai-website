$kind: http-request
description: <p>Creates an Issuing <code>Dispute</code> object. Individual
  pieces of evidence within the <code>evidence</code> object are optional at
  this point. Stripe only validates that required evidence is present during
  submission. Refer to <a
  href="/docs/issuing/purchases/disputes#dispute-reasons-and-evidence">Dispute
  reasons and evidence</a> for more details about evidence requirements.</p>
url: "{{baseUrl}}/v1/issuing/disputes"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      disabled: true
      description: The dispute amount in the card's currency and in the [smallest
        currency unit](https://stripe.com/docs/currencies#zero-decimal). If not
        set, defaults to the full transaction amount.
    - key: evidence[canceled][additional_documentation]
      value: <string>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][canceled_at]
      value: <unix-time>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][cancellation_policy_provided]
      value: <boolean>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][cancellation_reason]
      value: <string>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][expected_at]
      value: <unix-time>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][explanation]
      value: <string>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][product_description]
      value: <string>
      disabled: true
      description: Evidence provided for the dispute.
    - key: evidence[canceled][product_type]
      value: <string>
      disabled: true
