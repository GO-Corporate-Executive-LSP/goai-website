      value: <string>
      disabled: true
      description: Optional parameters for the receiver flow. Can be set only if the
        source is a receiver (`flow` is `receiver`).
    - key: redirect[return_url]
      value: <string>
      disabled: true
      description: Parameters required for the redirect flow. Required if the source
        is authenticated by a redirect (`flow` is `redirect`).
