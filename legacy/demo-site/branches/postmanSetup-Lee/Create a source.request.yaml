$kind: http-request
description: <p>Creates a new source object.</p>
url: "{{baseUrl}}/v1/sources"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: type
      value: <string>
      description: (Required) The `type` of the source to create. Required unless
        `customer` and `original_source` are specified (see the [Cloning card
        Sources](https://stripe.com/docs/sources/connect#cloning-card-sources)
        guide)
    - key: amount
      value: <integer>
      disabled: true
      description: Amount associated with the source. This is the amount for which the
        source will be chargeable once ready. Required for `single_use` sources.
        Not supported for `receiver` type sources, where charge amount may not
        be specified until funds land.
    - key: currency
      value: <string>
      disabled: true
      description: Three-letter [ISO code for the
        currency](https://stripe.com/docs/currencies) associated with the
        source. This is the currency for which the source will be chargeable
        once ready.
    - key: customer
      value: <string>
      disabled: true
      description: The `Customer` to whom the original source is attached to. Must be
        set when the original source is not a `Source` (e.g., `Card`).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: flow
      value: <string>
      disabled: true
      description: The authentication `flow` of the source to create. `flow` is one of
        `redirect`, `receiver`, `code_verification`, `none`. It is generally
        inferred unless a type supports multiple flows.
    - key: mandate[acceptance][status]
      value: <string>
      disabled: true
      description: Information about a mandate possibility attached to a source object
        (generally for bank debits) as well as its acceptance status.
    - key: mandate[acceptance][date]
      value: <unix-time>
      disabled: true
      description: Information about a mandate possibility attached to a source object
        (generally for bank debits) as well as its acceptance status.
    - key: mandate[acceptance][ip]
      value: <string>
      disabled: true
      description: Information about a mandate possibility attached to a source object
        (generally for bank debits) as well as its acceptance status.
