$kind: http-request
description: <p>Increment a test-mode Authorization.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/authorizations/:authorization/increment"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: authorization
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: increment_amount
      value: <integer>
      description: (Required) The amount to increment the authorization by. This
        amount is in the authorization currency and in the [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: is_amount_controllable
      value: <boolean>
      disabled: true
      description: If set `true`, you may provide
        [amount](https://stripe.com/docs/api/issuing/authorizations/approve#approve_issuing_authorization-amount)
        to control how much to hold for the authorization.
order: 9000
