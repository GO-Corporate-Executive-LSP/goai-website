$kind: http-request
description: <p>Deletes an item from the subscription. Removing a subscription
  item from a subscription will not cancel the subscription.</p>
url: "{{baseUrl}}/v1/subscription_items/:item"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: item
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: clear_usage
      value: <boolean>
      disabled: true
      description: Delete all usage for the given subscription item. Allowed only when
        the current plan's `usage_type` is `metered`.
    - key: proration_behavior
      value: <string>
      disabled: true
      description: Determines how to handle
        [prorations](https://stripe.com/docs/billing/subscriptions/prorations)
        when the billing cycle changes (e.g., when switching plans, resetting
        `billing_cycle_anchor=now`, or starting a trial), or if an item's
        `quantity` changes. The default value is `create_prorations`.
    - key: proration_date
      value: <unix-time>
      disabled: true
      description: If set, the proration will be calculated as though the subscription
        was updated at the given time. This can be used to apply the same
        proration that was previewed with the [upcoming
        invoice](https://stripe.com/docs/api#retrieve_customer_invoice)
        endpoint.
order: 3000
