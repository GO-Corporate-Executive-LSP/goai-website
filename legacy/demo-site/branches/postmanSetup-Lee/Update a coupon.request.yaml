$kind: http-request
description: <p>Updates the metadata of a coupon. Other coupon details
  (currency, duration, amount_off) are, by design, not editable.</p>
url: "{{baseUrl}}/v1/coupons/:coupon"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: coupon
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: name
      value: <string>
      disabled: true
      description: Name of the coupon displayed to customers on, for instance
        invoices, or receipts. By default the `id` is shown if `name` is not
        set.
order: 5000
