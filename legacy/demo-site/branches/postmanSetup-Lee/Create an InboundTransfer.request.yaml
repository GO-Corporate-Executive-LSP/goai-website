$kind: http-request
description: <p>Creates an InboundTransfer.</p>
url: "{{baseUrl}}/v1/treasury/inbound_transfers"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) Amount (in cents) to be transferred.
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: financial_account
      value: <string>
      description: (Required) The FinancialAccount to send funds to.
    - key: origin_payment_method
      value: <string>
      description: (Required) The origin payment method to be debited for the
        InboundTransfer.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: The complete description that appears on your customers'
        statements. Maximum 10 characters.
order: 4000
