$kind: http-request
description: <p>Presents a payment method on a simulated reader. Can be used to
  simulate accepting a payment, saving a card or refunding a transaction.</p>
url: "{{baseUrl}}/v1/test_helpers/terminal/readers/:reader/present_payment_method"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: reader
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: amount_tip
      value: <integer>
      disabled: true
      description: Simulated on-reader tip amount.
    - key: card_present[number]
      value: <string>
      disabled: true
      description: Simulated data for the card_present payment method.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: interac_present[number]
      value: <string>
      disabled: true
      description: Simulated data for the interac_present payment method.
    - key: type
      value: <string>
      disabled: true
      description: Simulated payment type.
order: 11000
