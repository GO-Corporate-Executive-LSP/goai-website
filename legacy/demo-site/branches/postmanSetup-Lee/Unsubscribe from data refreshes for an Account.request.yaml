$kind: http-request
description: <p>Unsubscribes from periodic refreshes of data associated with a
  Financial Connections <code>Account</code>.</p>
url: "{{baseUrl}}/v1/financial_connections/accounts/:account/unsubscribe"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: features[0]
      value: <string>
      description: (Required) The list of account features from which you would like
        to unsubscribe.
    - key: features[1]
      value: <string>
      description: (Required) The list of account features from which you would like
        to unsubscribe.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 6000
