        Can be combined with trials and the billing cycle anchor.
    - key: billing_cycle_anchor
      value: <unix-time>
      disabled: true
      description: A future timestamp in UTC format to anchor the subscription's
        [billing cycle](https://stripe.com/docs/subscriptions/billing-cycle).
        The anchor is the reference point that aligns future billing cycle
        dates. It sets the day of week for `week` intervals, the day of month
        for `month` and `year` intervals, and the month of year for `year`
        intervals.
    - key: billing_cycle_anchor_config[day_of_month]
      value: <integer>
