$kind: http-request
description: <p>Initiates a setup intent flow on a Reader.</p>
url: "{{baseUrl}}/v1/terminal/readers/:reader/process_setup_intent"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: reader
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: customer_consent_collected
      value: <boolean>
      description: (Required) Customer Consent Collected
    - key: setup_intent
      value: <string>
      description: (Required) SetupIntent ID
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: process_config[enable_customer_cancellation]
      value: <boolean>
      disabled: true
      description: Configuration overrides
order: 8000
