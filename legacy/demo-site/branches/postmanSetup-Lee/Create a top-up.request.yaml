$kind: http-request
description: <p>Top up the balance of an account</p>
url: "{{baseUrl}}/v1/topups"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) A positive integer representing how much to transfer.
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: source
      value: <string>
      disabled: true
      description: The ID of a source to transfer funds from. For most users, this
        should be left unspecified which will use the bank account that was set
        up in the dashboard for the specified currency. In test mode, this can
        be a test bank token (see [Testing
        Top-ups](https://stripe.com/docs/connect/testing#testing-top-ups)).
    - key: statement_descriptor
      value: <string>
      disabled: true
      description: Extra information about a top-up for the source's bank statement.
        Limited to 15 ASCII characters.
    - key: transfer_group
      value: <string>
      disabled: true
      description: A string that identifies this top-up as part of a group.
order: 2000
