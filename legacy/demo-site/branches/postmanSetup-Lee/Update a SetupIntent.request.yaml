$kind: http-request
description: <p>Updates a SetupIntent object.</p>
url: "{{baseUrl}}/v1/setup_intents/:intent"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: intent
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: attach_to_self
      value: <boolean>
      disabled: true
      description: >-
        If present, the SetupIntent's payment method will be attached to the
        in-context Stripe Account.


        It can only be used for this Stripe Account’s own money movement flows
        like InboundTransfer and OutboundTransfers. It cannot be set to true
        when setting up a PaymentMethod for a Customer, and defaults to false
        when attaching a PaymentMethod to a Customer.
    - key: customer
      value: <string>
      disabled: true
      description: >-
        ID of the Customer this SetupIntent belongs to, if one exists.


        If present, the SetupIntent's payment method will be attached to the
        Customer on successful setup. Payment methods attached to other
        Customers cannot be used with this SetupIntent.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: flow_directions[0]
      value: <string>
      disabled: true
      description: >-
        Indicates the directions of money movement for which this payment method
        is intended to be used.


        Include `inbound` if you intend to use the payment method as the origin
        to pull funds from. Include `outbound` if you intend to use the payment
        method as the destination to send funds to. You can include both if you
        intend to use the payment method for both purposes.
    - key: flow_directions[1]
      value: <string>
      disabled: true
      description: >-
        Indicates the directions of money movement for which this payment method
        is intended to be used.


        Include `inbound` if you intend to use the payment method as the origin
        to pull funds from. Include `outbound` if you intend to use the payment
        method as the destination to send funds to. You can include both if you
        intend to use the payment method for both purposes.
    - key: payment_method
      value: <string>
      disabled: true
      description: ID of the payment method (a PaymentMethod, Card, or saved Source
        object) to attach to this SetupIntent.
    - key: payment_method_configuration
      value: <string>
      disabled: true
      description: The ID of the payment method configuration to use with this SetupIntent.
