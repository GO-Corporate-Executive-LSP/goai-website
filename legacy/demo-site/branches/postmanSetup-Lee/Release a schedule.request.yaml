$kind: http-request
description: <p>Releases the subscription schedule immediately, which will stop
  scheduling of its phases, but leave any existing subscription in place. A
  schedule can only be released if its status is <code>not_started</code> or
  <code>active</code>. If the subscription schedule is currently associated with
  a subscription, releasing it will remove its <code>subscription</code>
  property and set the subscription’s ID to the
  <code>released_subscription</code> property.</p>
url: "{{baseUrl}}/v1/subscription_schedules/:schedule/release"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: schedule
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: preserve_cancel_date
      value: <boolean>
      disabled: true
      description: Keep any cancellation on the subscription that the schedule has set
order: 6000
