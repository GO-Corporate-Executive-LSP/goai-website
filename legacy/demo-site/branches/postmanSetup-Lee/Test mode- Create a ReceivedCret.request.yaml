$kind: http-request
name: "Test mode: Create a ReceivedCret"
description: <p>Use this endpoint to simulate a test mode ReceivedCredit
  initiated by a third party. In live mode, you can’t directly create
  ReceivedCredits initiated by third parties.</p>
url: "{{baseUrl}}/v1/test_helpers/treasury/received_credits"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: amount
      value: <integer>
      description: (Required) Amount (in cents) to be transferred.
    - key: currency
      value: <string>
      description: (Required) Three-letter [ISO currency
        code](https://www.iso.org/iso-4217-currency-codes.html), in lowercase.
        Must be a [supported currency](https://stripe.com/docs/currencies).
    - key: financial_account
      value: <string>
      description: (Required) The FinancialAccount to send funds to.
    - key: network
      value: <string>
      description: (Required) Specifies the network rails to be used. If not set, will
        default to the PaymentMethod's preferred network. See the
        [docs](https://stripe.com/docs/treasury/money-movement/timelines) to
        learn more about money movement timelines for each network type.
    - key: description
      value: <string>
      disabled: true
      description: An arbitrary string attached to the object. Often useful for
        displaying to users.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: initiating_payment_method_details[type]
      value: <string>
      disabled: true
      description: Initiating payment method details for the object.
    - key: initiating_payment_method_details[us_bank_account][account_holder_name]
      value: <string>
      disabled: true
      description: Initiating payment method details for the object.
    - key: initiating_payment_method_details[us_bank_account][account_number]
      value: <string>
      disabled: true
      description: Initiating payment method details for the object.
    - key: initiating_payment_method_details[us_bank_account][routing_number]
      value: <string>
      disabled: true
      description: Initiating payment method details for the object.
order: 1000
