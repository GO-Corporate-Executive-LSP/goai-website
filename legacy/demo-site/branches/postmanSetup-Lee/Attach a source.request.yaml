$kind: http-request
description: >-
  <p>When you create a new credit card, you must specify a customer or recipient
  on which to create it.</p>


  <p>If the card’s owner has no default card, then the new card will become the
  default.

  However, if the owner already has a default, then it will not change.

  To change the default, you should <a href="/docs/api#update_customer">update
  the customer</a> to have a new <code>default_source</code>.</p>
url: "{{baseUrl}}/v1/customers/:customer/sources"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: customer
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: source
      value: <string>
      description: (Required) Please refer to full
        [documentation](https://stripe.com/docs/api) instead.
    - key: alipay_account
      value: <string>
      disabled: true
      description: A token returned by [Stripe.js](https://stripe.com/docs/js)
        representing the user’s Alipay account details.
    - key: bank_account[account_number]
      value: <string>
      disabled: true
      description: Either a token, like the ones returned by
        [Stripe.js](https://stripe.com/docs/js), or a dictionary containing a
        user's bank account details.
    - key: bank_account[country]
      value: <string>
      disabled: true
      description: Either a token, like the ones returned by
        [Stripe.js](https://stripe.com/docs/js), or a dictionary containing a
