$kind: http-request
description: <p>Returns a list of SetupIntents.</p>
url: "{{baseUrl}}/v1/setup_intents"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: attach_to_self
    value: <boolean>
    disabled: true
    description: >-
      If present, the SetupIntent's payment method will be attached to the
      in-context Stripe Account.


      It can only be used for this Stripe Account’s own money movement flows
      like InboundTransfer and OutboundTransfers. It cannot be set to true when
      setting up a PaymentMethod for a Customer, and defaults to false when
      attaching a PaymentMethod to a Customer.
  - key: created[gt]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[gte]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[lt]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: created[lte]
    value: <integer>
    disabled: true
    description: A filter on the list, based on the object `created` field. The
      value can be a string with an integer Unix timestamp, or it can be a
      dictionary with a number of different query options.
  - key: customer
    value: <string>
    disabled: true
    description: Only return SetupIntents for the customer specified by this customer ID.
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: payment_method
    value: <string>
    disabled: true
    description: Only return SetupIntents that associate with the specified payment method.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
order: 1000
