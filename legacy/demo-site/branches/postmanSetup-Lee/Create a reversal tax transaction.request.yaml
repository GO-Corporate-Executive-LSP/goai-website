$kind: http-request
description: <p>Partially or fully reverses a previously created
  <code>Transaction</code>.</p>
url: "{{baseUrl}}/v1/tax/transactions/create_reversal"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: mode
      value: <string>
      description: (Required) If `partial`, the provided line item or shipping cost
        amounts are reversed. If `full`, the original transaction is fully
        reversed.
    - key: original_transaction
      value: <string>
      description: (Required) The ID of the Transaction to partially or fully reverse.
    - key: reference
      value: <string>
      description: (Required) A custom identifier for this reversal, such as
        `myOrder_123-refund_1`, which must be unique across all transactions.
        The reference helps identify this reversal transaction in exported [tax
        reports](https://stripe.com/docs/tax/reports).
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: flat_amount
      value: <integer>
      disabled: true
      description: A flat amount to reverse across the entire transaction, in the
        [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal) in negative. This
        value represents the total amount to refund from the transaction,
        including taxes.
    - key: line_items[0][amount]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[0][amount_tax]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[0][original_line_item]
      value: <string>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[0][reference]
      value: <string>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[0][metadata]
      value: <object>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[0][quantity]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][amount]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][amount_tax]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][original_line_item]
      value: <string>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][reference]
      value: <string>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][metadata]
      value: <object>
      disabled: true
      description: The line item amounts to reverse.
    - key: line_items[1][quantity]
      value: <integer>
      disabled: true
      description: The line item amounts to reverse.
    - key: shipping_cost[amount]
      value: <integer>
      disabled: true
      description: The shipping cost to reverse.
    - key: shipping_cost[amount_tax]
      value: <integer>
      disabled: true
      description: The shipping cost to reverse.
order: 1000
