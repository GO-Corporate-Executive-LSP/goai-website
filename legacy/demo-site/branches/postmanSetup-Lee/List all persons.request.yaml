$kind: http-request
description: <p>Returns a list of people associated with the account’s legal
  entity. The people are returned sorted by creation date, with the most recent
  people appearing first.</p>
url: "{{baseUrl}}/v1/accounts/:account/persons"
method: GET
headers:
  Content-Type: application/x-www-form-urlencoded
queryParams:
  - key: ending_before
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `ending_before` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, starting with `obj_bar`, your subsequent
      call can include `ending_before=obj_bar` in order to fetch the previous
      page of the list.
  - key: expand[0]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: expand[1]
    value: <string>
    disabled: true
    description: Specifies which fields in the response should be expanded.
  - key: limit
    value: <integer>
    disabled: true
    description: A limit on the number of objects to be returned. Limit can range
      between 1 and 100, and the default is 10.
  - key: relationship[director]
    value: <boolean>
    disabled: true
    description: Filters on the list of people returned based on the person's
      relationship to the account's company.
  - key: relationship[executive]
    value: <boolean>
    disabled: true
    description: Filters on the list of people returned based on the person's
      relationship to the account's company.
  - key: relationship[legal_guardian]
    value: <boolean>
    disabled: true
    description: Filters on the list of people returned based on the person's
      relationship to the account's company.
  - key: relationship[owner]
    value: <boolean>
    disabled: true
    description: Filters on the list of people returned based on the person's
      relationship to the account's company.
  - key: relationship[representative]
    value: <boolean>
    disabled: true
    description: Filters on the list of people returned based on the person's
      relationship to the account's company.
  - key: starting_after
    value: <string>
    disabled: true
    description: A cursor for use in pagination. `starting_after` is an object ID
      that defines your place in the list. For instance, if you make a list
      request and receive 100 objects, ending with `obj_foo`, your subsequent
      call can include `starting_after=obj_foo` in order to fetch the next page
      of the list.
pathVariables:
  - key: account
    value: <string>
    description: "(Required) "
order: 1000
