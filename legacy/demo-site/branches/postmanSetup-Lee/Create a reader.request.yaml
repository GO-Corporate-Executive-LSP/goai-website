$kind: http-request
description: <p>Creates a new <code>Reader</code> object.</p>
url: "{{baseUrl}}/v1/terminal/readers"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    - key: location
      value: <string>
      description: (Required) The location to assign the reader to.
    - key: registration_code
      value: <string>
      description: (Required) A code generated by the reader used for registering to
        an account.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: label
      value: <string>
      disabled: true
      description: Custom label given to the reader for easier identification. If no
        label is specified, the registration code will be used.
order: 2000
