$kind: http-request
description: <p>Capture a test-mode authorization.</p>
url: "{{baseUrl}}/v1/test_helpers/issuing/authorizations/:authorization/capture"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: authorization
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: capture_amount
      value: <integer>
      disabled: true
      description: The amount to capture from the authorization. If not provided, the
        full amount of the authorization will be captured. This amount is in the
        authorization currency and in the [smallest currency
        unit](https://stripe.com/docs/currencies#zero-decimal).
    - key: close_authorization
      value: <boolean>
      disabled: true
      description: Whether to close the authorization after capture. Defaults to true.
        Set to false to enable multi-capture flows.
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: purchase_details[flight][departure_at]
      value: <unix-time>
      disabled: true
      description: Additional purchase information that is optionally provided by the
        merchant.
    - key: purchase_details[flight][passenger_name]
      value: <string>
      disabled: true
      description: Additional purchase information that is optionally provided by the
        merchant.
    - key: purchase_details[flight][refundable]
      value: <boolean>
      disabled: true
      description: Additional purchase information that is optionally provided by the
        merchant.
    - key: purchase_details[flight][segments][0][arrival_airport_code]
      value: <string>
      disabled: true
      description: Additional purchase information that is optionally provided by the
