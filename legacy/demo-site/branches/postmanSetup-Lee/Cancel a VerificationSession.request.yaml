$kind: http-request
description: >-
  <p>A VerificationSession object can be canceled when it is in
  <code>requires_input</code> <a
  href="/docs/identity/how-sessions-work">status</a>.</p>


  <p>Once canceled, future submission attempts are disabled. This cannot be
  undone. <a href="/docs/identity/verification-sessions#cancel">Learn
  more</a>.</p>
url: "{{baseUrl}}/v1/identity/verification_sessions/:session/cancel"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: session
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
order: 7000
