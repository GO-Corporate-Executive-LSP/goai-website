$kind: http-request
description: >-
  <p>To upload a file to Stripe, you need to send a request of type
  <code>multipart/form-data</code>. Include the file you want to upload in the
  request, and the parameters for creating a file.</p>


  <p>All of Stripe’s officially supported Client libraries support sending
  <code>multipart/form-data</code>.</p>
url: https://files.stripe.com/v1/files
method: POST
headers:
  Content-Type: multipart/form-data
body:
  type: formdata
  content:
    - type: file
      key: file
      src: []
      description: (Required) A file to upload. Make sure that the specifications
        follow RFC 2388, which defines file transfers for the
        `multipart/form-data` protocol.
    - type: text
      key: purpose
      value: <string>
      description: (Required) The
        [purpose](https://stripe.com/docs/file-upload#uploading-a-file) of the
        uploaded file. (This can only be one of
        account_requirement,additional_verification,business_icon,business_logo,customer_signature,dispute_evidence,identity_document,pci_document,tax_document_user_upload,terminal_reader_splashscreen)
    - type: text
      key: expand
      value: '["<string>","<string>"]'
      description: Specifies which fields in the response should be expanded.
    - type: text
      key: file_link_data
      value: '{"create":"<boolean>","expires_at":"<unix-time>","metadata":"<object>"}'
      description: Optional parameters that automatically create a [file
        link](https://stripe.com/docs/api#file_links) for the newly created
        file.
order: 2000
