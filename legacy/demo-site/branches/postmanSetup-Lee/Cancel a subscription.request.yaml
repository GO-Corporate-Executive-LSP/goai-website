$kind: http-request
description: >-
  <p>Cancels a customer’s subscription immediately. The customer will not be
  charged again for the subscription.</p>


  <p>Note, however, that any pending invoice items that you’ve created will
  still be charged for at the end of the period, unless manually <a
  href="#delete_invoiceitem">deleted</a>. If you’ve set the subscription to
  cancel at the end of the period, any pending prorations will also be left in
  place and collected at the end of the period. But if the subscription is set
  to cancel immediately, pending prorations will be removed.</p>


  <p>By default, upon subscription cancellation, Stripe will stop automatic
  collection of all finalized invoices for the customer. This is intended to
  prevent unexpected payment attempts after the customer has canceled a
  subscription. However, you can resume automatic collection of the invoices
  manually after subscription cancellation to have us proceed. Or, you could
  check for unpaid invoices before allowing the customer to cancel the
  subscription at all.</p>
url: "{{baseUrl}}/v1/subscriptions/:subscription_exposed_id"
method: DELETE
headers:
  Content-Type: application/x-www-form-urlencoded
pathVariables:
  - key: subscription_exposed_id
    value: <string>
    description: "(Required) "
body:
  type: urlencoded
  content:
    - key: cancellation_details[comment]
      value: <string>
      disabled: true
      description: Details about why this subscription was cancelled
    - key: cancellation_details[feedback]
      value: <string>
      disabled: true
      description: Details about why this subscription was cancelled
    - key: expand[0]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: expand[1]
      value: <string>
      disabled: true
      description: Specifies which fields in the response should be expanded.
    - key: invoice_now
      value: <boolean>
      disabled: true
      description: Will generate a final invoice that invoices for any un-invoiced
        metered usage and new/pending proration invoice items.
    - key: prorate
      value: <boolean>
      disabled: true
      description: Will generate a proration invoice item that credits remaining
        unused time until the subscription period end.
order: 4000
